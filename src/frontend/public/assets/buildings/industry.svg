<?xml version="1.0" encoding="UTF-8"?>
<!--
  QuantumFab – Industry Building (Master SVG, 4× tile resolution)
  High-Tech Fertigungsanlage: Silber/Platin + violette Energieleitungen + Reaktorkern
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-128 -178 256 308"
     width="256" height="308">
  <defs>
    <!-- Foundation: very dark gunmetal -->
    <linearGradient id="fR" gradientUnits="userSpaceOnUse" x1="128" y1="40" x2="0" y2="104">
      <stop offset="0%"   stop-color="#3c3c44"/>
      <stop offset="100%" stop-color="#1c1c22"/>
    </linearGradient>
    <linearGradient id="fL" gradientUnits="userSpaceOnUse" x1="-128" y1="40" x2="0" y2="104">
      <stop offset="0%"   stop-color="#14141a"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>
    <linearGradient id="fT" gradientUnits="userSpaceOnUse" x1="0" y1="-24" x2="0" y2="104">
      <stop offset="0%"   stop-color="#4e4e58"/>
      <stop offset="100%" stop-color="#2c2c34"/>
    </linearGradient>
    <!-- Lower block: silver-platinum -->
    <linearGradient id="lR" gradientUnits="userSpaceOnUse" x1="88" y1="0" x2="0" y2="-56">
      <stop offset="0%"   stop-color="#c0c4cc"/>
      <stop offset="40%"  stop-color="#909098"/>
      <stop offset="100%" stop-color="#606068"/>
    </linearGradient>
    <linearGradient id="lL" gradientUnits="userSpaceOnUse" x1="-88" y1="0" x2="0" y2="-56">
      <stop offset="0%"   stop-color="#282830"/>
      <stop offset="100%" stop-color="#141418"/>
    </linearGradient>
    <linearGradient id="lT" gradientUnits="userSpaceOnUse" x1="0" y1="-80" x2="0" y2="-24">
      <stop offset="0%"   stop-color="#d8dce4"/>
      <stop offset="100%" stop-color="#a0a4ac"/>
    </linearGradient>
    <!-- Upper block: lighter platinum -->
    <linearGradient id="uR" gradientUnits="userSpaceOnUse" x1="56" y1="-56" x2="0" y2="-100">
      <stop offset="0%"   stop-color="#d4d8e0"/>
      <stop offset="40%"  stop-color="#a8acb4"/>
      <stop offset="100%" stop-color="#78788a"/>
    </linearGradient>
    <linearGradient id="uL" gradientUnits="userSpaceOnUse" x1="-56" y1="-56" x2="0" y2="-100">
      <stop offset="0%"   stop-color="#303038"/>
      <stop offset="100%" stop-color="#18181e"/>
    </linearGradient>
    <linearGradient id="uT" gradientUnits="userSpaceOnUse" x1="0" y1="-128" x2="0" y2="-80">
      <stop offset="0%"   stop-color="#e8eaf0"/>
      <stop offset="100%" stop-color="#b8bac4"/>
    </linearGradient>
    <!-- Reactor panel: glowing core visible through glass -->
    <radialGradient id="reactor" cx="40%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="20%"  stop-color="#cc88ff"/>
      <stop offset="55%"  stop-color="#7722cc"/>
      <stop offset="85%"  stop-color="#330066"/>
      <stop offset="100%" stop-color="#110022"/>
    </radialGradient>
    <!-- Energy conduit glow -->
    <linearGradient id="conduit" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="-130">
      <stop offset="0%"   stop-color="#cc44ff"/>
      <stop offset="50%"  stop-color="#8822cc"/>
      <stop offset="100%" stop-color="#441188"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coreglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══ FOUNDATION hz 0→24 (±128) ══ -->
  <polygon points="-128,64 0,128 0,104 -128,40"  fill="url(#fL)" stroke="#3a3a44" stroke-width="1.5"/>
  <polygon points="128,64 0,128 0,104 128,40"    fill="url(#fR)" stroke="#4e4e5a" stroke-width="1.5"/>
  <polygon points="0,-24 128,40 0,104 -128,40"   fill="url(#fT)" stroke="#4e4e5a" stroke-width="1.5"/>

  <!-- Foundation: geometric hex pattern suggestion -->
  <line x1="0" y1="-24"   x2="0"   y2="104" stroke="#7744cc" stroke-width="1" opacity="0.25"/>
  <line x1="-128" y1="40" x2="128" y2="40"  stroke="#7744cc" stroke-width="1" opacity="0.25"/>
  <line x1="-64" y1="24"  x2="64"  y2="56"  stroke="#7744cc" stroke-width="0.8" opacity="0.18"/>

  <circle cx="128"  cy="40"  r="6" fill="#aa44ff" filter="url(#glow)"/>
  <circle cx="-128" cy="40"  r="6" fill="#aa44ff" filter="url(#glow)"/>
  <circle cx="0"    cy="104" r="6" fill="#aa44ff" filter="url(#glow)"/>

  <line x1="128"  y1="56" x2="0" y2="116" stroke="#1a1a22" stroke-width="6"/>
  <line x1="128"  y1="56" x2="0" y2="116" stroke="#aa44ff" stroke-width="1.5" opacity="0.45"/>
  <line x1="-128" y1="56" x2="0" y2="116" stroke="#0c0c14" stroke-width="6"/>
  <line x1="-128" y1="56" x2="0" y2="116" stroke="#aa44ff" stroke-width="1"   opacity="0.25"/>

  <!-- ══ LOWER BLOCK hz 24→80 (±88) ══
       Right: 88,20  0,64  0,8  88,−36
       Left: −88,20  0,64  0,8  −88,−36
       Top:  0,−80  88,−36  0,8  −88,−36 -->
  <polygon points="-88,20 0,64 0,8 -88,-36"   fill="url(#lL)" stroke="#2a2a34" stroke-width="1.5"/>
  <line x1="-88" y1="20" x2="-88" y2="-36" stroke="#181820" stroke-width="3" opacity="0.6"/>

  <!-- Left face: vertical purple energy conduit (dim) -->
  <line x1="-80" y1="24" x2="-80" y2="-32" stroke="#3a1a5a" stroke-width="4"/>
  <line x1="-80" y1="24" x2="-80" y2="-32" stroke="#aa44ff" stroke-width="1.2" opacity="0.3"/>

  <polygon points="88,20 0,64 0,8 88,-36"     fill="url(#lR)" stroke="#9898a8" stroke-width="1.5"/>
  <line x1="88" y1="20" x2="88" y2="-36" stroke="#d0d0e0" stroke-width="3" opacity="0.65"/>

  <!-- Right face: REACTOR GLASS PANEL (main feature) -->
  <polygon points="70,16 42,30 42,-6 70,-20"    fill="#0a0014" stroke="#6622aa" stroke-width="2"/>
  <polygon points="68,14 44,28 44,-4 68,-18"    fill="url(#reactor)" opacity="0.9"/>
  <!-- Reactor glow bloom -->
  <polygon points="70,16 42,30 42,-6 70,-20"    fill="#cc44ff" opacity="0.08" filter="url(#coreglow)"/>
  <!-- Reactor panel lines -->
  <line x1="56" y1="28" x2="56" y2="-8"   stroke="#ee99ff" stroke-width="0.8" opacity="0.45"/>
  <line x1="70" y1="5"  x2="42" y2="12"   stroke="#ee99ff" stroke-width="0.8" opacity="0.45"/>

  <!-- Right face: tech panels above reactor -->
  <polygon points="28,24 14,31 14,16 28,9"   fill="#1a1428" stroke="#553388" stroke-width="1"/>
  <circle cx="21" cy="23.5" r="2.5" fill="#cc44ff" filter="url(#glow)"/>
  <circle cx="21" cy="16"   r="2.5" fill="#aa44ff" opacity="0.7"/>

  <!-- Right face: main energy conduit (bright) -->
  <line x1="82" y1="24" x2="82" y2="-32" stroke="#220044" stroke-width="6"/>
  <line x1="82" y1="24" x2="82" y2="-32" stroke="#cc44ff" stroke-width="2.5" opacity="0.9"/>
  <line x1="82" y1="24" x2="82" y2="-32" stroke="#ff88ff" stroke-width="1"   opacity="0.8"/>
  <line x1="82" y1="24" x2="82" y2="-32" stroke="#cc44ff" stroke-width="8"   opacity="0.15" filter="url(#coreglow)"/>

  <!-- Horizontal ring bands (energy) at hz=40, hz=64 -->
  <polyline points="88,-16 0,24 -88,-16"   stroke="#cc44ff" stroke-width="2"   fill="none" opacity="0.75"/>
  <polyline points="88,-40 0,0  -88,-40"   stroke="#cc44ff" stroke-width="2"   fill="none" opacity="0.6"/>

  <!-- Lower block top face -->
  <polygon points="0,-80 88,-36 0,8 -88,-36"    fill="url(#lT)" stroke="#9898a8" stroke-width="1.5"/>
  <line x1="0" y1="-80" x2="0" y2="8"       stroke="#cc44ff" stroke-width="1" opacity="0.3"/>
  <line x1="-88" y1="-36" x2="88" y2="-36"  stroke="#cc44ff" stroke-width="1" opacity="0.3"/>

  <circle cx="88"  cy="-36" r="5" fill="#cc44ff" filter="url(#glow)"/>
  <circle cx="-88" cy="-36" r="5" fill="#cc44ff" filter="url(#glow)" opacity="0.6"/>
  <circle cx="0"   cy="8"   r="5" fill="#cc44ff" filter="url(#glow)"/>

  <!-- ══ UPPER BLOCK hz 80→128 (±56) ══
       Right: 56,−52  0,−32  0,−80  56,−100
       Left: −56,−52  0,−32  0,−80  −56,−100
       Top:  0,−128  56,−100  0,−80  −56,−100 -->
  <polygon points="-56,-52 0,-32 0,-80 -56,-100"  fill="url(#uL)" stroke="#202028" stroke-width="1.5"/>
  <line x1="-56" y1="-52" x2="-56" y2="-100" stroke="#181820" stroke-width="2.5" opacity="0.55"/>

  <!-- Left face: dim conduit -->
  <line x1="-48" y1="-48" x2="-48" y2="-96" stroke="#3a1a5a" stroke-width="3"/>
  <line x1="-48" y1="-48" x2="-48" y2="-96" stroke="#aa44ff" stroke-width="1"   opacity="0.25"/>

  <polygon points="56,-52 0,-32 0,-80 56,-100"   fill="url(#uR)" stroke="#b0b0c4" stroke-width="1.5"/>
  <line x1="56" y1="-52" x2="56" y2="-100" stroke="#d8d8e8" stroke-width="2.5" opacity="0.65"/>

  <!-- Upper right: conduit continues -->
  <line x1="52" y1="-48" x2="52" y2="-96" stroke="#220044" stroke-width="5"/>
  <line x1="52" y1="-48" x2="52" y2="-96" stroke="#cc44ff" stroke-width="2"   opacity="0.85"/>
  <line x1="52" y1="-48" x2="52" y2="-96" stroke="#ff88ff" stroke-width="0.8" opacity="0.75"/>
  <line x1="52" y1="-48" x2="52" y2="-96" stroke="#cc44ff" stroke-width="7"   opacity="0.12" filter="url(#coreglow)"/>

  <!-- Upper right: precision windows (data readouts) -->
  <polygon points="42,-58 26,-50 26,-64 42,-72"  fill="#0a0018" stroke="#5522aa" stroke-width="1.5"/>
  <polygon points="40,-60 28,-52 28,-62 40,-70"  fill="#220066" opacity="0.8"/>
  <line x1="34" y1="-51" x2="34" y2="-65" stroke="#cc88ff" stroke-width="0.8" opacity="0.5"/>
  <line x1="42" y1="-60" x2="26" y2="-56" stroke="#cc88ff" stroke-width="0.8" opacity="0.5"/>

  <polygon points="20,-46 8,-40 8,-54 20,-60"    fill="#0a0018" stroke="#5522aa" stroke-width="1.5"/>
  <circle cx="14" cy="-50" r="3" fill="#bb44ff" filter="url(#glow)"/>

  <!-- Energy ring bands at hz=96, hz=112 -->
  <polyline points="56,-68 0,-48 -56,-68"   stroke="#cc44ff" stroke-width="2"   fill="none" opacity="0.7"/>
  <polyline points="56,-84 0,-64 -56,-84"   stroke="#cc44ff" stroke-width="2"   fill="none" opacity="0.55"/>

  <!-- Upper block top face -->
  <polygon points="0,-128 56,-100 0,-80 -56,-100"  fill="url(#uT)" stroke="#b0b0c4" stroke-width="1.5"/>
  <line x1="0" y1="-128" x2="0" y2="-80"      stroke="#cc44ff" stroke-width="1" opacity="0.3"/>
  <line x1="-56" y1="-100" x2="56" y2="-100"  stroke="#cc44ff" stroke-width="1" opacity="0.3"/>

  <circle cx="56"  cy="-100" r="5" fill="#cc44ff" filter="url(#glow)"/>
  <circle cx="-56" cy="-100" r="5" fill="#cc44ff" filter="url(#glow)" opacity="0.6"/>
  <circle cx="0"   cy="-80"  r="5" fill="#cc44ff" filter="url(#glow)"/>

  <!-- ══ ROOFTOP: QUANTUM EMITTER ARRAY ══ -->
  <!-- Central emitter ring -->
  <ellipse cx="0" cy="-128" rx="36" ry="18" fill="none" stroke="#cc44ff" stroke-width="2"   opacity="0.7"/>
  <ellipse cx="0" cy="-128" rx="36" ry="18" fill="none" stroke="#ff88ff" stroke-width="5"   opacity="0.15" filter="url(#softglow)"/>
  <ellipse cx="0" cy="-128" rx="20" ry="10" fill="none" stroke="#cc44ff" stroke-width="1.5" opacity="0.55"/>

  <!-- Emitter node at center -->
  <circle cx="0" cy="-128" r="6"  fill="#cc44ff" opacity="0.9" filter="url(#glow)"/>
  <circle cx="0" cy="-128" r="12" fill="#cc44ff" opacity="0.1" filter="url(#softglow)"/>

  <!-- Energy spire -->
  <line x1="0" y1="-134" x2="0" y2="-174" stroke="#aa33dd" stroke-width="2.5"/>
  <line x1="0" y1="-134" x2="0" y2="-174" stroke="#ff88ff" stroke-width="1"   opacity="0.7"/>

  <!-- Cross bars on spire -->
  <line x1="-14" y1="-162" x2="14" y2="-162" stroke="#cc44ff" stroke-width="2"/>
  <line x1="-8"  y1="-150" x2="8"  y2="-150" stroke="#cc44ff" stroke-width="1.5"/>

  <!-- Apex glow layers -->
  <circle cx="0" cy="-174" r="10" fill="#cc44ff" opacity="0.12" filter="url(#softglow)"/>
  <circle cx="0" cy="-174" r="5"  fill="#cc44ff" opacity="0.7"  filter="url(#glow)"/>
  <circle cx="0" cy="-174" r="2.5" fill="#ffffff"/>
</svg>
