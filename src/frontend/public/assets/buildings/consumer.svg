<?xml version="1.0" encoding="UTF-8"?>
<!--
  HydroSpire – Consumer Building (Master SVG, 4× tile resolution)
  Vertikaler Hydroponik-Turm mit lila Wachstumslicht-Ringen
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-128 -178 256 308"
     width="256" height="308">
  <defs>
    <!-- Foundation: gray-green concrete -->
    <linearGradient id="fR" gradientUnits="userSpaceOnUse" x1="128" y1="32" x2="0" y2="96">
      <stop offset="0%"   stop-color="#3e5c3a"/>
      <stop offset="100%" stop-color="#1e2e1a"/>
    </linearGradient>
    <linearGradient id="fL" gradientUnits="userSpaceOnUse" x1="-128" y1="32" x2="0" y2="96">
      <stop offset="0%"   stop-color="#141e12"/>
      <stop offset="100%" stop-color="#080c06"/>
    </linearGradient>
    <linearGradient id="fT" gradientUnits="userSpaceOnUse" x1="0" y1="-32" x2="0" y2="96">
      <stop offset="0%"   stop-color="#50703e"/>
      <stop offset="100%" stop-color="#30461e"/>
    </linearGradient>
    <!-- Base unit: gray-green equipment -->
    <linearGradient id="bR" gradientUnits="userSpaceOnUse" x1="88" y1="4" x2="0" y2="16">
      <stop offset="0%"   stop-color="#445e3c"/>
      <stop offset="60%"  stop-color="#2e4228"/>
      <stop offset="100%" stop-color="#1c2a18"/>
    </linearGradient>
    <linearGradient id="bL" gradientUnits="userSpaceOnUse" x1="-88" y1="4" x2="0" y2="16">
      <stop offset="0%"   stop-color="#161e12"/>
      <stop offset="100%" stop-color="#0a0e08"/>
    </linearGradient>
    <linearGradient id="bT" gradientUnits="userSpaceOnUse" x1="0" y1="-72" x2="0" y2="16">
      <stop offset="0%"   stop-color="#5e7a4a"/>
      <stop offset="100%" stop-color="#3c5030"/>
    </linearGradient>
    <!-- Tower: clean white-gray hydroponic column -->
    <linearGradient id="tR" gradientUnits="userSpaceOnUse" x1="22" y1="-53" x2="0" y2="-138">
      <stop offset="0%"   stop-color="#ccddc8"/>
      <stop offset="50%"  stop-color="#a0b89c"/>
      <stop offset="100%" stop-color="#708a6c"/>
    </linearGradient>
    <linearGradient id="tL" gradientUnits="userSpaceOnUse" x1="-22" y1="-53" x2="0" y2="-138">
      <stop offset="0%"   stop-color="#3a4838"/>
      <stop offset="100%" stop-color="#1e2a1c"/>
    </linearGradient>
    <linearGradient id="tTop" gradientUnits="userSpaceOnUse" x1="0" y1="-160" x2="0" y2="-138">
      <stop offset="0%"   stop-color="#ddeedd"/>
      <stop offset="100%" stop-color="#aaccaa"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ringbloom" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══ FOUNDATION hz 0→24 (±128) ══ -->
  <polygon points="-128,64 0,128 0,104 -128,40"  fill="url(#fL)" stroke="#3a6030" stroke-width="1.5"/>
  <polygon points="128,64 0,128 0,104 128,40"    fill="url(#fR)" stroke="#3a6030" stroke-width="1.5"/>
  <polygon points="0,-24 128,40 0,104 -128,40"   fill="url(#fT)" stroke="#3a6030" stroke-width="1.5"/>

  <g transform="translate(0, 36)">
  <!-- ══ BASE UNIT hz 24→56 (±88) ══ -->
  <polygon points="-88,4 0,48 0,16 -88,-28"   fill="url(#bL)" stroke="#2e4a28" stroke-width="1.5"/>
  <polygon points="88,4 0,48 0,16 88,-28"     fill="url(#bR)" stroke="#4a6a3a" stroke-width="1.5"/>
  <polygon points="0,-72 88,-28 0,16 -88,-28"  fill="url(#bT)" stroke="#4a6a3a" stroke-width="1.5"/>

  <!-- Base unit: ventilation slots on right face -->
  <line x1="88" y1="4"  x2="88"  y2="-28" stroke="#66aa44" stroke-width="2" opacity="0.55"/>
  <line x1="66" y1="7"   x2="22"  y2="29"  stroke="#4a7a30" stroke-width="1.5" opacity="0.5"/>
  <line x1="66" y1="-1"  x2="22"  y2="21"  stroke="#4a7a30" stroke-width="1.5" opacity="0.5"/>
  <line x1="66" y1="-9"  x2="22"  y2="13"  stroke="#4a7a30" stroke-width="1.5" opacity="0.5"/>

  <!-- Base unit: ventilation slots on left face (dim mirror) -->
  <line x1="-88" y1="4"  x2="-88"  y2="-28" stroke="#2a4a18" stroke-width="2" opacity="0.55"/>
  <line x1="-66" y1="7"   x2="-22"  y2="29"  stroke="#1e3a14" stroke-width="1.5" opacity="0.4"/>
  <line x1="-66" y1="-1"  x2="-22"  y2="21"  stroke="#1e3a14" stroke-width="1.5" opacity="0.4"/>
  <line x1="-66" y1="-9"  x2="-22"  y2="13"  stroke="#1e3a14" stroke-width="1.5" opacity="0.4"/>

  <!-- Base corners -->
  <circle cx="88"  cy="-28" r="5" fill="#55ee33" filter="url(#glow)"/>
  <circle cx="-88" cy="-28" r="5" fill="#55ee33" filter="url(#glow)" opacity="0.6"/>
  <circle cx="0"   cy="16"  r="5" fill="#55ee33" filter="url(#glow)"/>

  <!-- ══ TOWER hz 56→152 (±22) ══ -->
  <g transform="translate(0, 25)">
  <polygon points="-22,-53 0,-42 0,-138 -22,-149"  fill="url(#tL)" stroke="#2a3a28" stroke-width="1.2"/>
  <polygon points="22,-53 0,-42 0,-138 22,-149"    fill="url(#tR)" stroke="#7a9a78" stroke-width="1.2"/>
  <polygon points="0,-160 22,-149 0,-138 -22,-149"  fill="url(#tTop)" stroke="#7a9a78" stroke-width="1.2"/>

  <!-- Tower edge highlight (right) -->
  <line x1="22" y1="-53" x2="22" y2="-149" stroke="#bbddbb" stroke-width="2"   opacity="0.6"/>
  <line x1="22" y1="-53" x2="22" y2="-149" stroke="#ffffff" stroke-width="0.8" opacity="0.4"/>

  <!-- Tower edge shadow (left, dim mirror) -->
  <line x1="-22" y1="-53" x2="-22" y2="-149" stroke="#2a3a28" stroke-width="2" opacity="0.6"/>

  <!-- Axial decorations -->
  <g transform="translate(0, 11)">

  <!-- ══ GROW-LIGHT RINGS (purple/violet spectrum) ══ -->

  <!-- Ring hz=82 – bottom ring -->
  <path d="M 28,-82 A 28,14 0 0,1 -28,-82" fill="none" stroke="#cc44ff" stroke-width="1.5" opacity="0.8"/>
  <path d="M 28,-82 A 28,14 0 0,1 -28,-82" fill="none" stroke="#ee88ff" stroke-width="4"   opacity="0.25" filter="url(#ringbloom)"/>
  <path d="M 14,-82 A 14,7 0 0,1 -14,-82 Z" fill="#cc44ff" opacity="0.08"/>

  <!-- Ring hz=102 -->
  <path d="M 28,-102 A 28,14 0 0,1 -28,-102" fill="none" stroke="#cc44ff" stroke-width="1.5" opacity="0.8"/>
  <path d="M 28,-102 A 28,14 0 0,1 -28,-102" fill="none" stroke="#ee88ff" stroke-width="4"   opacity="0.25" filter="url(#ringbloom)"/>
  <path d="M 14,-102 A 14,7 0 0,1 -14,-102 Z" fill="#cc44ff" opacity="0.08"/>

  <!-- Ring hz=122 -->
  <path d="M 28,-122 A 28,14 0 0,1 -28,-122" fill="none" stroke="#cc44ff" stroke-width="1.5" opacity="0.8"/>
  <path d="M 28,-122 A 28,14 0 0,1 -28,-122" fill="none" stroke="#ee88ff" stroke-width="4"   opacity="0.25" filter="url(#ringbloom)"/>
  <path d="M 14,-122 A 14,7 0 0,1 -14,-122 Z" fill="#cc44ff" opacity="0.08"/>

  <!-- Ring hz=142 – top ring -->
  <path d="M 28,-142 A 28,14 0 0,1 -28,-142" fill="none" stroke="#dd66ff" stroke-width="2"   opacity="0.85"/>
  <path d="M 28,-142 A 28,14 0 0,1 -28,-142" fill="none" stroke="#ff99ff" stroke-width="6"   opacity="0.2"  filter="url(#ringbloom)"/>
  <path d="M 14,-142 A 14,7 0 0,1 -14,-142 Z" fill="#cc44ff" opacity="0.1"/>

  <!-- Growing pod "leaf" accents at each ring (right side) -->
  <ellipse cx="28" cy="-82"  rx="6" ry="4" fill="#2a8a10" opacity="0.7" transform="rotate(20,28,-82)"/>
  <ellipse cx="28" cy="-102" rx="6" ry="4" fill="#2a8a10" opacity="0.7" transform="rotate(20,28,-102)"/>
  <ellipse cx="28" cy="-122" rx="6" ry="4" fill="#2a8a10" opacity="0.7" transform="rotate(20,28,-122)"/>
  <ellipse cx="28" cy="-142" rx="6" ry="4" fill="#338810" opacity="0.75" transform="rotate(20,28,-142)"/>

  <!-- Growing pod "leaf" accents at each ring (left side, dim mirror) -->
  <ellipse cx="-28" cy="-82"  rx="6" ry="4" fill="#1a4a08" opacity="0.5" transform="rotate(-20,-28,-82)"/>
  <ellipse cx="-28" cy="-102" rx="6" ry="4" fill="#1a4a08" opacity="0.5" transform="rotate(-20,-28,-102)"/>
  <ellipse cx="-28" cy="-122" rx="6" ry="4" fill="#1a4a08" opacity="0.5" transform="rotate(-20,-28,-122)"/>
  <ellipse cx="-28" cy="-142" rx="6" ry="4" fill="#1f4a08" opacity="0.55" transform="rotate(-20,-28,-142)"/>

  <!-- Tower top: apex spire -->
  <line x1="0" y1="-160" x2="0" y2="-176" stroke="#aaccaa" stroke-width="2.5"/>
  <circle cx="0" cy="-176" r="5"  fill="#88ffaa" opacity="0.9" filter="url(#glow)"/>
  <circle cx="0" cy="-176" r="10" fill="none"    stroke="#66ff88" stroke-width="1.5" opacity="0.45"/>
  </g>
  </g>
  </g>
</svg>
