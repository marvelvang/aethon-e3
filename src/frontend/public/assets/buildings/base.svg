<?xml version="1.0" encoding="UTF-8"?>
<!--
  Command Nexus – Base Building (Master SVG, 4× tile resolution)
  ──────────────────────────────────────────────────────────────
  Tile: TILE_HALF_WIDTH=32, TILE_HALF_HEIGHT=16 → 64×32 px at 1×
  This SVG: 4× → tile footprint 256×128 px, total 256×308 px

  Isometric origin (0,0) = tile-top vertex
  Projection: screen_x = (wx-wy)×128,  screen_y = (wx+wy)×64 − hz

  PixiJS usage (displayed at 1× tile size):
    sprite.anchor.set(0.5, 178/308)   // tile-top vertex in image coords
    sprite.position.set(tileTopX, tileTopY)
    sprite.scale.set(64/256)           // 4× → 1×
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-128 -178 256 308"
     width="256" height="308">
  <defs>
    <!-- ── Gradients ── -->
    <linearGradient id="fR" gradientUnits="userSpaceOnUse" x1="128" y1="16" x2="0" y2="104">
      <stop offset="0%"   stop-color="#3d5e7e"/>
      <stop offset="100%" stop-color="#1a2d42"/>
    </linearGradient>
    <linearGradient id="fL" gradientUnits="userSpaceOnUse" x1="-128" y1="16" x2="0" y2="104">
      <stop offset="0%"   stop-color="#111d2c"/>
      <stop offset="100%" stop-color="#07101a"/>
    </linearGradient>
    <linearGradient id="fT" gradientUnits="userSpaceOnUse" x1="-64" y1="-48" x2="64" y2="80">
      <stop offset="0%"   stop-color="#527090"/>
      <stop offset="100%" stop-color="#2d4d68"/>
    </linearGradient>
    <linearGradient id="tR" gradientUnits="userSpaceOnUse" x1="64" y1="-96" x2="0" y2="48">
      <stop offset="0%"   stop-color="#1c6090"/>
      <stop offset="60%"  stop-color="#0d3a5c"/>
      <stop offset="100%" stop-color="#07202e"/>
    </linearGradient>
    <linearGradient id="tL" gradientUnits="userSpaceOnUse" x1="-64" y1="-96" x2="0" y2="48">
      <stop offset="0%"   stop-color="#082638"/>
      <stop offset="100%" stop-color="#030c14"/>
    </linearGradient>
    <linearGradient id="tT" gradientUnits="userSpaceOnUse" x1="-32" y1="-128" x2="32" y2="-64">
      <stop offset="0%"   stop-color="#2c8abe"/>
      <stop offset="100%" stop-color="#124e72"/>
    </linearGradient>
    <radialGradient id="dome" cx="32%" cy="22%" r="72%">
      <stop offset="0%"   stop-color="#f2fdff"/>
      <stop offset="28%"  stop-color="#00d8ff"/>
      <stop offset="72%"  stop-color="#0055a0"/>
      <stop offset="100%" stop-color="#002244" stop-opacity="0.45"/>
    </radialGradient>
    <radialGradient id="winR" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#c8f4ff"/>
      <stop offset="100%" stop-color="#003a6a"/>
    </radialGradient>
    <radialGradient id="winL" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#50aacc"/>
      <stop offset="100%" stop-color="#001828"/>
    </radialGradient>

    <!-- ── Glow filter ── -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══════════════════════════════════════════
       FOUNDATION   hz 0 → 48
       Bottom: N(0,0) E(128,64) S(0,128) W(-128,64)
       Top:    N(0,-48) E(128,16) S(0,80) W(-128,16)
       ══════════════════════════════════════════ -->

  <polygon points="128,64 0,128 0,80 128,16"   fill="url(#fR)" stroke="#00aac8" stroke-width="1.5"/>
  <polygon points="-128,64 0,128 0,80 -128,16" fill="url(#fL)" stroke="#00aac8" stroke-width="1.5"/>
  <polygon points="0,-48 128,16 0,80 -128,16"  fill="url(#fT)" stroke="#00aac8" stroke-width="1.5"/>

  <!-- Top-face grid lines -->
  <line x1="0" y1="-48" x2="0" y2="80"     stroke="#6888a8" stroke-width="1.2" opacity="0.5"/>
  <line x1="-128" y1="16" x2="128" y2="16" stroke="#6888a8" stroke-width="1.2" opacity="0.5"/>

  <!-- Landing pad (orange diamond, centered at 0,16) -->
  <polygon points="0,-4 52,16 0,36 -52,16"  fill="none" stroke="#ff8c00" stroke-width="2.5"/>
  <polygon points="0,4  36,16 0,28 -36,16"  fill="none" stroke="#ff8c00" stroke-width="1.5" opacity="0.55"/>
  <line x1="-52" y1="16" x2="52" y2="16"   stroke="#ff8c00" stroke-width="1"   opacity="0.5"/>
  <line x1="0" y1="-4"  x2="0" y2="36"     stroke="#ff8c00" stroke-width="1"   opacity="0.5"/>

  <!-- Corner indicator lights (3 visible corners) -->
  <circle cx="128"  cy="16" r="7" fill="#00d4ff" filter="url(#glow)"/>
  <circle cx="-128" cy="16" r="7" fill="#00d4ff" filter="url(#glow)"/>
  <circle cx="0"    cy="80" r="7" fill="#00d4ff" filter="url(#glow)"/>

  <!-- Right face: access hatch -->
  <polygon points="51,100 76,89 76,62 51,73" fill="#0c1c2c" stroke="#00aac8" stroke-width="1.5"/>
  <polygon points="56,96  72,88 72,66 56,74" fill="#112233" stroke="#00d4ff" stroke-width="1"   opacity="0.65"/>
  <circle cx="64" cy="81" r="4" fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>

  <!-- Right face: tech status panel -->
  <polygon points="90,82 112,72 112,51 90,61" fill="#0c1c2c" stroke="#00aac8" stroke-width="1"/>
  <circle cx="98"  cy="67" r="3" fill="#00e878"/>
  <circle cx="103" cy="65" r="3" fill="#00e878"/>
  <circle cx="108" cy="62" r="3" fill="#ffaa00"/>

  <!-- Right face: cable duct along lower edge -->
  <line x1="128" y1="56" x2="0" y2="114" stroke="#1e4868" stroke-width="5"/>
  <line x1="128" y1="56" x2="0" y2="114" stroke="#00aac8" stroke-width="1.2" opacity="0.45"/>
  <!-- Left face: matching duct -->
  <line x1="-128" y1="56" x2="0" y2="114" stroke="#0e2030" stroke-width="5"/>
  <line x1="-128" y1="56" x2="0" y2="114" stroke="#00aac8" stroke-width="1.2" opacity="0.25"/>

  <!-- ══════════════════════════════════════════
       TOWER   hz 48 → 160
       Base: N(0,-16) E(64,16) S(0,48) W(-64,16)
       Top:  N(0,-128) E(64,-96) S(0,-64) W(-64,-96)
       ══════════════════════════════════════════ -->

  <polygon points="64,16 0,48 0,-64 64,-96"    fill="url(#tR)" stroke="#00aac8" stroke-width="1.5"/>
  <polygon points="-64,16 0,48 0,-64 -64,-96"  fill="url(#tL)" stroke="#00aac8" stroke-width="1.5"/>
  <polygon points="0,-128 64,-96 0,-64 -64,-96" fill="url(#tT)" stroke="#00aac8" stroke-width="1.5"/>

  <!-- Structural vertical edge highlights -->
  <line x1="64"  y1="-96" x2="64"  y2="16" stroke="#4898c8" stroke-width="2.5" opacity="0.65"/>
  <line x1="-64" y1="-96" x2="-64" y2="16" stroke="#183850" stroke-width="2.5" opacity="0.5"/>

  <!-- Horizontal ribs  hz=80: E(64,-16) S(0,16)  |  hz=120: E(64,-56) S(0,-24) -->
  <line x1="64"  y1="-16" x2="0" y2="16"  stroke="#3a8ab8" stroke-width="2.5" opacity="0.75"/>
  <line x1="-64" y1="-16" x2="0" y2="16"  stroke="#1a3850" stroke-width="2.5" opacity="0.55"/>
  <line x1="64"  y1="-56" x2="0" y2="-24" stroke="#3a8ab8" stroke-width="2.5" opacity="0.75"/>
  <line x1="-64" y1="-56" x2="0" y2="-24" stroke="#1a3850" stroke-width="2.5" opacity="0.55"/>

  <!-- ── RIGHT FACE: 2×2 windows ── -->
  <!-- Row 1  (hz 65–95)  t=0.15–0.43  and  t=0.57–0.85 -->
  <polygon points="10,25 27,17 27,-13 10,-5"  fill="url(#winR)" stroke="#00c8e8" stroke-width="1.5"/>
  <line x1="18" y1="21"  x2="18" y2="-9"  stroke="#a0e8f8" stroke-width="0.9" opacity="0.5"/>
  <line x1="10" y1="6"   x2="27" y2="2"   stroke="#a0e8f8" stroke-width="0.9" opacity="0.5"/>
  <polygon points="36,13 54,4 54,-26 36,-17" fill="url(#winR)" stroke="#00c8e8" stroke-width="1.5"/>
  <line x1="45" y1="9"   x2="45" y2="-22" stroke="#a0e8f8" stroke-width="0.9" opacity="0.5"/>
  <line x1="36" y1="-3"  x2="54" y2="-11" stroke="#a0e8f8" stroke-width="0.9" opacity="0.5"/>

  <!-- Row 2  (hz 110–140) -->
  <polygon points="10,-20 27,-28 27,-58 10,-50" fill="url(#winR)" stroke="#00c8e8" stroke-width="1.5"/>
  <line x1="18" y1="-24" x2="18" y2="-54" stroke="#a0e8f8" stroke-width="0.9" opacity="0.5"/>
  <line x1="10" y1="-39" x2="27" y2="-43" stroke="#a0e8f8" stroke-width="0.9" opacity="0.5"/>
  <polygon points="36,-32 54,-41 54,-71 36,-62" fill="url(#winR)" stroke="#00c8e8" stroke-width="1.5"/>
  <line x1="45" y1="-37" x2="45" y2="-67" stroke="#a0e8f8" stroke-width="0.9" opacity="0.5"/>
  <line x1="36" y1="-52" x2="54" y2="-56" stroke="#a0e8f8" stroke-width="0.9" opacity="0.5"/>

  <!-- ── LEFT FACE: windows (shadow side, dimmer) ── -->
  <polygon points="-10,25 -27,17 -27,-13 -10,-5"  fill="url(#winL)" stroke="#006880" stroke-width="1" opacity="0.75"/>
  <polygon points="-36,13 -54,4 -54,-26 -36,-17"  fill="url(#winL)" stroke="#006880" stroke-width="1" opacity="0.75"/>
  <polygon points="-10,-20 -27,-28 -27,-58 -10,-50" fill="url(#winL)" stroke="#006880" stroke-width="1" opacity="0.75"/>
  <polygon points="-36,-32 -54,-41 -54,-71 -36,-62" fill="url(#winL)" stroke="#006880" stroke-width="1" opacity="0.75"/>

  <!-- ── Energy conduits ── -->
  <!-- Right face: glow halo + bright core -->
  <line x1="36" y1="46" x2="36" y2="-90" stroke="#00d4ff" stroke-width="6"   opacity="0.18" filter="url(#glow)"/>
  <line x1="36" y1="46" x2="36" y2="-90" stroke="#00d4ff" stroke-width="2.5" opacity="0.85"/>
  <line x1="36" y1="46" x2="36" y2="-90" stroke="#d0f8ff" stroke-width="1"   opacity="0.9"/>
  <!-- Left face: dimmer -->
  <line x1="-36" y1="46" x2="-36" y2="-90" stroke="#00d4ff" stroke-width="3"   opacity="0.10"/>
  <line x1="-36" y1="46" x2="-36" y2="-90" stroke="#00d4ff" stroke-width="1.5" opacity="0.35"/>

  <!-- Mid-band rings (V-shape meeting at front S vertex) -->
  <polyline points="64,-16 0,16 -64,-16"   stroke="#00d4ff" stroke-width="2.5" fill="none" opacity="0.8"/>
  <polyline points="64,-56 0,-24 -64,-56"  stroke="#00d4ff" stroke-width="2.5" fill="none" opacity="0.8"/>

  <!-- Tower top: power emitter ring -->
  <ellipse cx="0" cy="-96" rx="28" ry="14" fill="none" stroke="#00d4ff" stroke-width="2"   opacity="0.65"/>
  <circle  cx="0" cy="-96" r="6"           fill="#00d4ff"                                    filter="url(#glow)"/>

  <!-- ══════════════════════════════════════════
       DOME   center (0,-112)  rx=32 ry=20
       ══════════════════════════════════════════ -->

  <!-- Outer ambient glow ring -->
  <ellipse cx="0" cy="-96" rx="46" ry="17" fill="none" stroke="#00d4ff" stroke-width="2"   opacity="0.3" filter="url(#softglow)"/>
  <!-- Energy collar (orange accent) -->
  <ellipse cx="0" cy="-98" rx="36" ry="13" fill="none" stroke="#ff8c00" stroke-width="1.5" opacity="0.5"/>

  <!-- Dome body -->
  <ellipse cx="0" cy="-112" rx="32" ry="20" fill="url(#dome)" stroke="#00d4ff" stroke-width="2"/>

  <!-- Dome facet rings -->
  <ellipse cx="0" cy="-112" rx="21" ry="13" fill="none" stroke="#60d8ff" stroke-width="1"   opacity="0.38"/>
  <ellipse cx="0" cy="-112" rx="10" ry="6"  fill="none" stroke="#60d8ff" stroke-width="1"   opacity="0.38"/>

  <!-- Specular highlight -->
  <ellipse cx="-9" cy="-121" rx="11" ry="6"  fill="white" opacity="0.22"/>
  <ellipse cx="-5" cy="-124" rx="4"  ry="2.5" fill="white" opacity="0.35"/>

  <!-- ══════════════════════════════════════════
       ANTENNA   (0,-132) → (0,-176)
       ══════════════════════════════════════════ -->
  <line x1="0" y1="-132" x2="0" y2="-176" stroke="#90e8ff" stroke-width="2.5"/>
  <!-- Cross bars -->
  <line x1="-13" y1="-160" x2="13" y2="-160" stroke="#90e8ff" stroke-width="2.5"/>
  <line x1="-8"  y1="-148" x2="8"  y2="-148" stroke="#90e8ff" stroke-width="2"/>
  <!-- Tip glow layers -->
  <circle cx="0" cy="-176" r="10" fill="#00ffff" opacity="0.15" filter="url(#softglow)"/>
  <circle cx="0" cy="-176" r="5"  fill="#00ffff" opacity="0.55"/>
  <circle cx="0" cy="-176" r="3"  fill="#ffffff"/>
</svg>
