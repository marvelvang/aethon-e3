<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-32 -46 64 78"
     width="64" height="78">
  <!--
    Command Nexus – Base Building
    Isometric single-tile building. Tile-top vertex at SVG origin (0,0).
    PixiJS anchor: sprite.anchor.set(0.5, 46/78)
    Tile footprint: 64×32 px  (TILE_HALF_WIDTH=32, TILE_HALF_HEIGHT=16)
    Building height: 40 screen-px (foundation 12 + tower 28)
  -->
  <defs>
    <!-- Foundation: lit right face -->
    <linearGradient id="fR" gradientUnits="userSpaceOnUse" x1="32" y1="4" x2="0" y2="20">
      <stop offset="0%"   stop-color="#2c4862"/>
      <stop offset="100%" stop-color="#162838"/>
    </linearGradient>
    <!-- Foundation: shadow left face -->
    <linearGradient id="fL" gradientUnits="userSpaceOnUse" x1="-32" y1="4" x2="0" y2="20">
      <stop offset="0%"   stop-color="#0f1d2c"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
    <!-- Foundation: top face -->
    <linearGradient id="fT" gradientUnits="userSpaceOnUse" x1="-16" y1="-12" x2="16" y2="20">
      <stop offset="0%"   stop-color="#3a5878"/>
      <stop offset="100%" stop-color="#253d58"/>
    </linearGradient>
    <!-- Tower: lit right face -->
    <linearGradient id="tR" gradientUnits="userSpaceOnUse" x1="16" y1="-24" x2="0" y2="4">
      <stop offset="0%"   stop-color="#1d6898"/>
      <stop offset="100%" stop-color="#10406a"/>
    </linearGradient>
    <!-- Tower: shadow left face -->
    <linearGradient id="tL" gradientUnits="userSpaceOnUse" x1="-16" y1="-24" x2="0" y2="4">
      <stop offset="0%"   stop-color="#0a3252"/>
      <stop offset="100%" stop-color="#071c32"/>
    </linearGradient>
    <!-- Tower: top face -->
    <linearGradient id="tT" gradientUnits="userSpaceOnUse" x1="-8" y1="-32" x2="8" y2="-16">
      <stop offset="0%"   stop-color="#2878a8"/>
      <stop offset="100%" stop-color="#185880"/>
    </linearGradient>
    <!-- Dome: radial glow -->
    <radialGradient id="dome" cx="30%" cy="25%" r="75%">
      <stop offset="0%"   stop-color="#e8faff"/>
      <stop offset="40%"  stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#004466" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <!-- ════════════════════════════════
       FOUNDATION  (hz 0 → 12)
       N(0,0) E(32,16) S(0,32) W(-32,16)  ← ground level
       N(0,-12) E(32,4) S(0,20) W(-32,4)  ← top of platform
       ════════════════════════════════ -->
  <!-- Right face -->
  <polygon points="32,16 0,32 0,20 32,4"   fill="url(#fR)" stroke="#00aac8" stroke-width="0.5"/>
  <!-- Left face -->
  <polygon points="-32,16 0,32 0,20 -32,4" fill="url(#fL)" stroke="#00aac8" stroke-width="0.5"/>
  <!-- Top face -->
  <polygon points="0,-12 32,4 0,20 -32,4"  fill="url(#fT)" stroke="#00aac8" stroke-width="0.5"/>

  <!-- Top face detail: cross grid lines -->
  <line x1="0" y1="-12" x2="0" y2="20"  stroke="#4a7090" stroke-width="0.4" opacity="0.6"/>
  <line x1="-32" y1="4" x2="32" y2="4"  stroke="#4a7090" stroke-width="0.4" opacity="0.6"/>

  <!-- Corner indicator lights (3 visible outer corners) -->
  <circle cx="32"  cy="4"  r="1.8" fill="#00d4ff"/>
  <circle cx="-32" cy="4"  r="1.8" fill="#00d4ff"/>
  <circle cx="0"   cy="20" r="1.8" fill="#00d4ff"/>

  <!-- ════════════════════════════════
       TOWER  (hz 12 → 40, half-tile footprint)
       Base: N(0,-4) E(16,4) S(0,12) W(-16,4)
       Top:  N(0,-32) E(16,-24) S(0,-16) W(-16,-24)
       ════════════════════════════════ -->
  <!-- Right face -->
  <polygon points="16,4 0,12 0,-16 16,-24"   fill="url(#tR)" stroke="#00aac8" stroke-width="0.5"/>
  <!-- Left face -->
  <polygon points="-16,4 0,12 0,-16 -16,-24" fill="url(#tL)" stroke="#00aac8" stroke-width="0.5"/>
  <!-- Top face -->
  <polygon points="0,-32 16,-24 0,-16 -16,-24" fill="url(#tT)" stroke="#00aac8" stroke-width="0.5"/>

  <!-- Energy conduits: vertical cyan lines on each face -->
  <line x1="9"  y1="8"  x2="9"  y2="-21" stroke="#00d4ff" stroke-width="1"   opacity="0.65"/>
  <line x1="-9" y1="8"  x2="-9" y2="-21" stroke="#00d4ff" stroke-width="1"   opacity="0.65"/>

  <!-- Mid-band ring at hz=26: E(16,-10)→S(0,-2) and W(-16,-10)→S(0,-2) -->
  <line x1="16"  y1="-10" x2="0" y2="-2" stroke="#00d4ff" stroke-width="0.8" opacity="0.8"/>
  <line x1="-16" y1="-10" x2="0" y2="-2" stroke="#00d4ff" stroke-width="0.8" opacity="0.8"/>

  <!-- Status indicator dots -->
  <circle cx="11"  cy="-14" r="1.2" fill="#00d4ff" opacity="0.85"/>
  <circle cx="-11" cy="-14" r="1.2" fill="#00d4ff" opacity="0.5"/>

  <!-- ════════════════════════════════
       DOME  (sits on tower top face)
       Center (0,-30), rx=8 ry=5
       ════════════════════════════════ -->
  <!-- Ambient glow ring at dome base -->
  <ellipse cx="0" cy="-26" rx="10" ry="4"
           fill="none" stroke="#00d4ff" stroke-width="0.7" opacity="0.35"/>
  <!-- Dome body -->
  <ellipse cx="0" cy="-30" rx="8" ry="5"
           fill="url(#dome)" stroke="#00d4ff" stroke-width="0.8"/>
  <!-- Specular highlight -->
  <ellipse cx="-2" cy="-32" rx="3" ry="1.8"
           fill="white" opacity="0.22"/>

  <!-- ════════════════════════════════
       ANTENNA
       ════════════════════════════════ -->
  <line x1="0" y1="-35" x2="0" y2="-44" stroke="#80e8ff" stroke-width="0.9"/>
  <!-- Cross bar -->
  <line x1="-3" y1="-40" x2="3" y2="-40" stroke="#80e8ff" stroke-width="0.9"/>
  <!-- Tip glow dot -->
  <circle cx="0" cy="-44" r="1.5" fill="#00ffff"/>
</svg>
