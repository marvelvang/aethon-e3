<?xml version="1.0" encoding="UTF-8"?>
<!--
  TerraFarm – Consumer Option 2 (Master SVG, 4× tile resolution)
  Gestuftes Terrassengebäude mit lebenden Pflanzenwänden

  Box ±F hz1→hz2:
    Right: F,F/2-hz1  0,F-hz1  0,F-hz2  F,F/2-hz2
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-128 -178 256 308"
     width="256" height="308">
  <defs>
    <!-- Foundation: dark fertile earth -->
    <linearGradient id="fR" gradientUnits="userSpaceOnUse" x1="128" y1="32" x2="0" y2="96">
      <stop offset="0%"   stop-color="#6e3a10"/>
      <stop offset="100%" stop-color="#3a1a06"/>
    </linearGradient>
    <linearGradient id="fL" gradientUnits="userSpaceOnUse" x1="-128" y1="32" x2="0" y2="96">
      <stop offset="0%"   stop-color="#1e0e04"/>
      <stop offset="100%" stop-color="#0a0602"/>
    </linearGradient>
    <linearGradient id="fT" gradientUnits="userSpaceOnUse" x1="0" y1="-32" x2="0" y2="96">
      <stop offset="0%"   stop-color="#8c4a18"/>
      <stop offset="100%" stop-color="#5a2e0c"/>
    </linearGradient>
    <!-- Block A: mid terracotta-brown -->
    <linearGradient id="aR" gradientUnits="userSpaceOnUse" x1="80" y1="8" x2="0" y2="-8">
      <stop offset="0%"   stop-color="#9c4c1e"/>
      <stop offset="60%"  stop-color="#7a3212"/>
      <stop offset="100%" stop-color="#4e1e08"/>
    </linearGradient>
    <linearGradient id="aL" gradientUnits="userSpaceOnUse" x1="-80" y1="8" x2="0" y2="-8">
      <stop offset="0%"   stop-color="#2a1006"/>
      <stop offset="100%" stop-color="#0e0603"/>
    </linearGradient>
    <linearGradient id="aT" gradientUnits="userSpaceOnUse" x1="0" y1="-88" x2="0" y2="-8">
      <stop offset="0%"   stop-color="#c06028"/>
      <stop offset="100%" stop-color="#8c3e16"/>
    </linearGradient>
    <!-- Block B: lighter warm brown -->
    <linearGradient id="bR" gradientUnits="userSpaceOnUse" x1="48" y1="-64" x2="0" y2="-80">
      <stop offset="0%"   stop-color="#b45a24"/>
      <stop offset="60%"  stop-color="#8a3a14"/>
      <stop offset="100%" stop-color="#5c2208"/>
    </linearGradient>
    <linearGradient id="bL" gradientUnits="userSpaceOnUse" x1="-48" y1="-64" x2="0" y2="-80">
      <stop offset="0%"   stop-color="#1e0c04"/>
      <stop offset="100%" stop-color="#080402"/>
    </linearGradient>
    <linearGradient id="bT" gradientUnits="userSpaceOnUse" x1="0" y1="-128" x2="0" y2="-80">
      <stop offset="0%"   stop-color="#d87030"/>
      <stop offset="100%" stop-color="#aa4e1c"/>
    </linearGradient>
    <!-- Terrace: vivid growing green -->
    <linearGradient id="terR" gradientUnits="userSpaceOnUse" x1="80" y1="0" x2="0" y2="16">
      <stop offset="0%"   stop-color="#2e8c14"/>
      <stop offset="100%" stop-color="#1a5c0a"/>
    </linearGradient>
    <!-- Grow-light window: warm yellow -->
    <radialGradient id="winW" cx="35%" cy="30%" r="68%">
      <stop offset="0%"   stop-color="#fffacc"/>
      <stop offset="40%"  stop-color="#ffdd44"/>
      <stop offset="100%" stop-color="#bb7700"/>
    </radialGradient>
    <radialGradient id="winD" cx="35%" cy="30%" r="68%">
      <stop offset="0%"   stop-color="#cc9922"/>
      <stop offset="100%" stop-color="#442200"/>
    </radialGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══ FOUNDATION hz 0→32 (±128) ══ -->
  <polygon points="-128,64 0,128 0,96 -128,32"  fill="url(#fL)" stroke="#8c4a14" stroke-width="1.5"/>
  <polygon points="128,64 0,128 0,96 128,32"    fill="url(#fR)" stroke="#8c4a14" stroke-width="1.5"/>
  <polygon points="0,-32 128,32 0,96 -128,32"   fill="url(#fT)" stroke="#8c4a14" stroke-width="1.5"/>

  <line x1="0" y1="-32"   x2="0"   y2="96" stroke="#aa5a18" stroke-width="1" opacity="0.4"/>
  <line x1="-128" y1="32" x2="128" y2="32"  stroke="#aa5a18" stroke-width="1" opacity="0.4"/>

  <circle cx="128"  cy="32"  r="6" fill="#ff8800" filter="url(#glow)"/>
  <circle cx="-128" cy="32"  r="6" fill="#ff8800" filter="url(#glow)"/>
  <circle cx="0"    cy="96"  r="6" fill="#ff8800" filter="url(#glow)"/>

  <line x1="128"  y1="48" x2="0" y2="108" stroke="#3a1806" stroke-width="5"/>
  <line x1="128"  y1="48" x2="0" y2="108" stroke="#ff8800" stroke-width="1"   opacity="0.38"/>
  <line x1="-128" y1="48" x2="0" y2="108" stroke="#180c02" stroke-width="5"/>
  <line x1="-128" y1="48" x2="0" y2="108" stroke="#ff8800" stroke-width="0.8" opacity="0.22"/>

  <!-- ══ BLOCK A hz 32→88 (±80) ══
       Right: 80,8  0,48  0,−8  80,−48
       Left: −80,8  0,48  0,−8  −80,−48  -->
  <polygon points="-80,8 0,48 0,-8 -80,-48"  fill="url(#aL)" stroke="#8c3a14" stroke-width="1.5"/>

  <!-- Left face: dim windows (shadow side) -->
  <polygon points="-68,4 -44,16 -44,2 -68,-10"   fill="url(#winD)" stroke="#773300" stroke-width="1" opacity="0.65"/>
  <polygon points="-36,20 -12,32 -12,16 -36,4"   fill="url(#winD)" stroke="#773300" stroke-width="1" opacity="0.65"/>
  <polygon points="-68,-20 -44,-8 -44,-22 -68,-34"  fill="url(#winD)" stroke="#773300" stroke-width="1" opacity="0.55"/>

  <polygon points="80,8 0,48 0,-8 80,-48"    fill="url(#aR)" stroke="#cc5a20" stroke-width="1.5"/>
  <line x1="80" y1="8" x2="80" y2="-48" stroke="#dd7030" stroke-width="2" opacity="0.6"/>

  <!-- Right face: GREEN TERRACE STRIPS (growing areas) -->
  <!-- Strip 1 hz 36→46: 80,4 0,44 0,34 80,-6 -->
  <polygon points="80,4 0,44 0,34 80,-6"   fill="url(#terR)" stroke="#44aa18" stroke-width="1.2" opacity="0.92"/>
  <line x1="80" y1="4"  x2="0" y2="44" stroke="#66dd22" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="-6" x2="0" y2="34" stroke="#66dd22" stroke-width="0.8" opacity="0.4"/>

  <!-- Strip 2 hz 52→62 -->
  <polygon points="80,-12 0,28 0,18 80,-22" fill="url(#terR)" stroke="#44aa18" stroke-width="1.2" opacity="0.92"/>
  <line x1="80" y1="-12" x2="0" y2="28" stroke="#66dd22" stroke-width="1"   opacity="0.5"/>
  <line x1="80" y1="-22" x2="0" y2="18" stroke="#66dd22" stroke-width="0.8" opacity="0.4"/>

  <!-- Strip 3 hz 68→78 -->
  <polygon points="80,-28 0,12 0,2 80,-38" fill="url(#terR)" stroke="#44aa18" stroke-width="1.2" opacity="0.92"/>
  <line x1="80" y1="-28" x2="0" y2="12" stroke="#66dd22" stroke-width="1"   opacity="0.5"/>
  <line x1="80" y1="-38" x2="0" y2="2"  stroke="#66dd22" stroke-width="0.8" opacity="0.4"/>

  <!-- Right face: grow-light windows between strips -->
  <polygon points="56,-1 36,9 36,-3 56,-13"  fill="url(#winW)" stroke="#ffcc44" stroke-width="1.2"/>
  <polygon points="26,13 6,23 6,11 26,1"     fill="url(#winW)" stroke="#ffcc44" stroke-width="1.2"/>
  <polygon points="56,-25 36,-15 36,-27 56,-37"  fill="url(#winW)" stroke="#ffcc44" stroke-width="1.2"/>

  <!-- Block A top face -->
  <polygon points="0,-88 80,-48 0,-8 -80,-48"  fill="url(#aT)" stroke="#cc5a20" stroke-width="1.5"/>

  <!-- Terrace corners -->
  <circle cx="80"  cy="-48" r="5" fill="#ffaa00" filter="url(#glow)"/>
  <circle cx="-80" cy="-48" r="5" fill="#ff8c00" filter="url(#glow)" opacity="0.65"/>
  <circle cx="0"   cy="-8"  r="5" fill="#ffaa00" filter="url(#glow)"/>

  <!-- ══ BLOCK B hz 88→128 (±48) ══
       Right: 48,−64  0,−40  0,−80  48,−104
       Left: −48,−64  0,−40  0,−80  −48,−104  -->
  <polygon points="-48,-64 0,-40 0,-80 -48,-104" fill="url(#bL)" stroke="#8c3a14" stroke-width="1.5"/>

  <!-- Left face: dim window -->
  <polygon points="-40,-68 -22,-59 -22,-72 -40,-81" fill="url(#winD)" stroke="#663300" stroke-width="1" opacity="0.6"/>

  <polygon points="48,-64 0,-40 0,-80 48,-104"   fill="url(#bR)" stroke="#cc5a20" stroke-width="1.5"/>
  <line x1="48" y1="-64" x2="48" y2="-104" stroke="#dd7030" stroke-width="2" opacity="0.55"/>

  <!-- Block B: green terrace strips -->
  <!-- Strip 4 hz 92→100: 48,-68 0,-44 0,-52 48,-76 -->
  <polygon points="48,-68 0,-44 0,-52 48,-76" fill="url(#terR)" stroke="#44aa18" stroke-width="1.2" opacity="0.9"/>
  <line x1="48" y1="-68" x2="0" y2="-44" stroke="#66dd22" stroke-width="1" opacity="0.5"/>

  <!-- Strip 5 hz 112→120 -->
  <polygon points="48,-88 0,-64 0,-72 48,-96" fill="url(#terR)" stroke="#44aa18" stroke-width="1.2" opacity="0.9"/>
  <line x1="48" y1="-88" x2="0" y2="-64" stroke="#66dd22" stroke-width="1" opacity="0.5"/>

  <!-- Block B: grow-light windows -->
  <polygon points="40,-72 22,-63 22,-75 40,-84" fill="url(#winW)" stroke="#ffcc44" stroke-width="1.2"/>
  <polygon points="18,-58 4,-51 4,-63 18,-70"   fill="url(#winW)" stroke="#ffcc44" stroke-width="1.2"/>

  <!-- Block B top face -->
  <polygon points="0,-128 48,-104 0,-80 -48,-104" fill="url(#bT)" stroke="#cc5a20" stroke-width="1.5"/>

  <!-- ══ PARAPET / ROOF RIM hz 128→136 (±50) ══ -->
  <polygon points="-50,-103 0,-78 0,-86 -50,-111" fill="#1e0e04" stroke="#884422" stroke-width="1.2"/>
  <polygon points="50,-103 0,-78 0,-86 50,-111"   fill="#9c4818" stroke="#dd6622" stroke-width="1.2"/>
  <polygon points="0,-136 50,-111 0,-86 -50,-111" fill="#c05824" stroke="#dd6622" stroke-width="1.2"/>

  <circle cx="50"  cy="-111" r="4" fill="#ff6600" filter="url(#glow)"/>
  <circle cx="-50" cy="-111" r="4" fill="#ff8800" filter="url(#glow)" opacity="0.7"/>
  <circle cx="0"   cy="-86"  r="4" fill="#ff6600" filter="url(#glow)"/>

  <!-- ══ ROOFTOP GARDEN ══ -->
  <!-- Planter box right -->
  <polygon points="14,-126 26,-120 26,-132 14,-138" fill="#1a0c04" stroke="#553300" stroke-width="1"/>
  <polygon points="30,-120 26,-120 26,-132 30,-132" fill="#5a2a08" stroke="#884422" stroke-width="1"/>
  <polygon points="14,-138 26,-132 30,-132 18,-138" fill="#7a3a10" stroke="#aa4422" stroke-width="1"/>
  <!-- Planter soil + plants -->
  <ellipse cx="22" cy="-132" rx="7" ry="3" fill="#2a6614" opacity="0.85"/>
  <circle  cx="22" cy="-136" r="4" fill="#33aa18" filter="url(#glow)" opacity="0.7"/>

  <!-- Planter box left -->
  <polygon points="-26,-120 -14,-126 -14,-138 -26,-132" fill="#0e0602" stroke="#442200" stroke-width="1" opacity="0.9"/>
  <polygon points="-30,-120 -26,-120 -26,-132 -30,-132" fill="#2a1204" stroke="#553300" stroke-width="1" opacity="0.9"/>
  <ellipse cx="-22" cy="-132" rx="6" ry="3" fill="#226010" opacity="0.75"/>
  <circle  cx="-22" cy="-136" r="3" fill="#33aa18" filter="url(#glow)" opacity="0.6"/>

  <!-- Grow-light pole -->
  <line x1="0" y1="-136" x2="0" y2="-170" stroke="#cc8833" stroke-width="2.5"/>
  <ellipse cx="0" cy="-166" rx="18" ry="6" fill="#fffacc" opacity="0.15" filter="url(#softglow)"/>
  <ellipse cx="0" cy="-166" rx="18" ry="6" fill="none" stroke="#ffee66" stroke-width="1.5" opacity="0.7"/>
  <circle  cx="0" cy="-166" r="3" fill="#ffffff"/>
</svg>
