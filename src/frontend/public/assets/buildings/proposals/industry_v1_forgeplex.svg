<?xml version="1.0" encoding="UTF-8"?>
<!--
  ForgePlex – Industry Option 1 (Master SVG, 4× tile resolution)
  Schweres Industriegebäude mit Schornsteinen und Hitzeglühen
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-128 -178 256 308"
     width="256" height="308">
  <defs>
    <!-- Foundation: dark charcoal concrete -->
    <linearGradient id="fR" gradientUnits="userSpaceOnUse" x1="128" y1="16" x2="0" y2="80">
      <stop offset="0%"   stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#242424"/>
    </linearGradient>
    <linearGradient id="fL" gradientUnits="userSpaceOnUse" x1="-128" y1="16" x2="0" y2="80">
      <stop offset="0%"   stop-color="#181818"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="fT" gradientUnits="userSpaceOnUse" x1="0" y1="-48" x2="0" y2="80">
      <stop offset="0%"   stop-color="#606060"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </linearGradient>
    <!-- Main factory block: steel gray -->
    <linearGradient id="mR" gradientUnits="userSpaceOnUse" x1="88" y1="-4" x2="0" y2="-24">
      <stop offset="0%"   stop-color="#686868"/>
      <stop offset="45%"  stop-color="#4e4e4e"/>
      <stop offset="100%" stop-color="#303030"/>
    </linearGradient>
    <linearGradient id="mL" gradientUnits="userSpaceOnUse" x1="-88" y1="-4" x2="0" y2="-24">
      <stop offset="0%"   stop-color="#222222"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </linearGradient>
    <linearGradient id="mT" gradientUnits="userSpaceOnUse" x1="0" y1="-112" x2="0" y2="-24">
      <stop offset="0%"   stop-color="#787878"/>
      <stop offset="100%" stop-color="#545454"/>
    </linearGradient>
    <!-- Control shaft: darker gray -->
    <linearGradient id="sR" gradientUnits="userSpaceOnUse" x1="20" y1="-102" x2="0" y2="-132">
      <stop offset="0%"   stop-color="#585858"/>
      <stop offset="100%" stop-color="#343434"/>
    </linearGradient>
    <linearGradient id="sL" gradientUnits="userSpaceOnUse" x1="-20" y1="-102" x2="0" y2="-132">
      <stop offset="0%"   stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </linearGradient>
    <!-- Smokestack: dark matte steel -->
    <linearGradient id="stR" gradientUnits="userSpaceOnUse" x1="8" y1="-112" x2="0" y2="-160">
      <stop offset="0%"   stop-color="#504040"/>
      <stop offset="100%" stop-color="#282020"/>
    </linearGradient>
    <!-- Heat vent glow -->
    <radialGradient id="heatglow" cx="50%" cy="100%" r="80%">
      <stop offset="0%"   stop-color="#ff6600" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#ff3300" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <!-- Warning stripe yellow -->
    <linearGradient id="warn" gradientUnits="userSpaceOnUse" x1="128" y1="64" x2="0" y2="80">
      <stop offset="0%"   stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#cc9900"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="heatbloom" x="-100%" y="-200%" width="300%" height="500%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══ FOUNDATION hz 0→48 (±128) ══
       Right: 128,64  0,128  0,80  128,16
       Left: −128,64  0,128  0,80  −128,16
       Top:  0,−48  128,16  0,80  −128,16 -->
  <polygon points="-128,64 0,128 0,80 -128,16"  fill="url(#fL)" stroke="#404040" stroke-width="1.5"/>

  <!-- Warning stripe on left foundation face -->
  <polygon points="-128,64 0,128 0,112 -128,48"  fill="#cc9900" opacity="0.25" stroke="none"/>
  <polygon points="-128,48 0,112 0,96 -128,32"   fill="#181818" opacity="0.5"  stroke="none"/>

  <polygon points="128,64 0,128 0,80 128,16"    fill="url(#fR)" stroke="#505050" stroke-width="1.5"/>

  <!-- Warning stripes on right face -->
  <polygon points="128,64 0,128 0,112 128,48"   fill="#ffcc00" opacity="0.28" stroke="none"/>
  <polygon points="128,48 0,112 0,96 128,32"    fill="#181818" opacity="0.4"  stroke="none"/>
  <polygon points="128,32 0,96 0,80 128,16"     fill="#ffcc00" opacity="0.18" stroke="none"/>

  <polygon points="0,-48 128,16 0,80 -128,16"   fill="url(#fT)" stroke="#505050" stroke-width="1.5"/>

  <!-- Foundation grid -->
  <line x1="0" y1="-48"   x2="0"   y2="80" stroke="#666666" stroke-width="1" opacity="0.35"/>
  <line x1="-128" y1="16" x2="128" y2="16" stroke="#666666" stroke-width="1" opacity="0.35"/>

  <!-- Foundation corner lights (red industrial) -->
  <circle cx="128"  cy="16" r="6" fill="#ff4400" filter="url(#glow)"/>
  <circle cx="-128" cy="16" r="6" fill="#ff4400" filter="url(#glow)"/>
  <circle cx="0"    cy="80" r="6" fill="#ff4400" filter="url(#glow)"/>

  <!-- Heavy cable ducts -->
  <line x1="128" y1="32"  x2="0" y2="92" stroke="#1e1e1e" stroke-width="7"/>
  <line x1="128" y1="32"  x2="0" y2="92" stroke="#555555" stroke-width="2"   opacity="0.4"/>
  <line x1="-128" y1="32" x2="0" y2="92" stroke="#101010" stroke-width="7"/>
  <line x1="-128" y1="32" x2="0" y2="92" stroke="#333333" stroke-width="2"   opacity="0.3"/>

  <!-- ══ MAIN FACTORY BLOCK hz 48→112 (±88) ══
       Right: 88,−4  0,40  0,−24  88,−68
       Left: −88,−4  0,40  0,−24  −88,−68
       Top:  0,−112  88,−68  0,−24  −88,−68 -->
  <polygon points="-88,-4 0,40 0,-24 -88,-68"  fill="url(#mL)" stroke="#3a3a3a" stroke-width="1.5"/>
  <line x1="-88" y1="-4" x2="-88" y2="-68" stroke="#181818" stroke-width="2.5" opacity="0.5"/>

  <!-- Left face: industrial panels (horizontal ribs) -->
  <line x1="-88" y1="-22" x2="0" y2="22"  stroke="#2a2a2a" stroke-width="2" opacity="0.7"/>
  <line x1="-88" y1="-40" x2="0" y2="4"   stroke="#2a2a2a" stroke-width="2" opacity="0.7"/>

  <polygon points="88,-4 0,40 0,-24 88,-68"    fill="url(#mR)" stroke="#5a5a5a" stroke-width="1.5"/>
  <line x1="88" y1="-4" x2="88" y2="-68" stroke="#888888" stroke-width="2.5" opacity="0.55"/>

  <!-- Right face: industrial panel lines -->
  <line x1="88" y1="-22" x2="0" y2="22"  stroke="#808080" stroke-width="1.5" opacity="0.5"/>
  <line x1="88" y1="-40" x2="0" y2="4"   stroke="#808080" stroke-width="1.5" opacity="0.5"/>

  <!-- Right face: access hatch -->
  <polygon points="62,-8 42,2 42,-16 62,-26"    fill="#1a1a1a" stroke="#4a4a4a" stroke-width="1.5"/>
  <polygon points="58,-11 46,-5 46,-15 58,-21"  fill="#222222" stroke="#666666" stroke-width="1"   opacity="0.7"/>
  <circle  cx="52" cy="-13" r="3.5" fill="#ff4400" opacity="0.9" filter="url(#glow)"/>

  <!-- Right face: status panel -->
  <polygon points="82,-12 72,-7 72,-18 82,-23" fill="#1a1a1a" stroke="#444444" stroke-width="1"/>
  <circle cx="79" cy="-13" r="2.5" fill="#ffcc00"/>
  <circle cx="79" cy="-19" r="2.5" fill="#ff4400"/>

  <!-- Right face: HEAT VENT at bottom -->
  <polygon points="32,22 20,28 20,36 32,30"     fill="#331100" stroke="#ff5500" stroke-width="1.5"/>
  <ellipse cx="26" cy="29" rx="6" ry="4" fill="url(#heatglow)" opacity="0.7"/>

  <!-- Right face: horizontal conduits -->
  <line x1="88" y1="-36" x2="0" y2="4"  stroke="#ff6600" stroke-width="3"   opacity="0.12" filter="url(#heatbloom)"/>
  <line x1="88" y1="-36" x2="0" y2="4"  stroke="#ff6600" stroke-width="1.2" opacity="0.5"/>

  <!-- Factory top face -->
  <polygon points="0,-112 88,-68 0,-24 -88,-68"  fill="url(#mT)" stroke="#5a5a5a" stroke-width="1.5"/>

  <!-- Top face: rooftop detail lines -->
  <line x1="0" y1="-112" x2="0" y2="-24"    stroke="#888888" stroke-width="1" opacity="0.4"/>
  <line x1="-88" y1="-68" x2="88" y2="-68"  stroke="#888888" stroke-width="1" opacity="0.4"/>

  <!-- Top corners -->
  <circle cx="88"  cy="-68" r="5" fill="#ff4400" filter="url(#glow)"/>
  <circle cx="-88" cy="-68" r="5" fill="#ff4400" filter="url(#glow)" opacity="0.6"/>
  <circle cx="0"   cy="-24" r="5" fill="#ff4400" filter="url(#glow)"/>

  <!-- ══ CONTROL SHAFT hz 112→152 (±20) ══
       Right: 20,−102  0,−92  0,−132  20,−142
       Left: −20,−102  0,−92  0,−132  −20,−142
       Top:  0,−152  20,−142  0,−132  −20,−142 -->
  <polygon points="-20,-102 0,-92 0,-132 -20,-142" fill="url(#sL)" stroke="#303030" stroke-width="1.2"/>
  <polygon points="20,-102 0,-92 0,-132 20,-142"   fill="url(#sR)" stroke="#606060" stroke-width="1.2"/>
  <polygon points="0,-152 20,-142 0,-132 -20,-142"  fill="#606060" stroke="#606060" stroke-width="1.2"/>

  <!-- Shaft: indicator strip -->
  <line x1="20" y1="-102" x2="20" y2="-142" stroke="#ff6600" stroke-width="1.5" opacity="0.55"/>
  <line x1="16" y1="-118" x2="0"  y2="-110" stroke="#ff4400" stroke-width="1.5" opacity="0.5"/>

  <!-- ══ SMOKESTACKS (3 stacks, screen-space placement) ══ -->
  <!-- Stack A (center-left, tallest) hz ≈ 112→168 -->
  <polygon points="-8,-112 4,-112 4,-166 -8,-166"   fill="url(#stR)" stroke="#404040" stroke-width="1.2"/>
  <ellipse cx="-2" cy="-112" rx="6" ry="3"  fill="#383838" stroke="#505050" stroke-width="1"/>
  <ellipse cx="-2" cy="-166" rx="6" ry="3"  fill="#282020" stroke="#404040" stroke-width="1"/>
  <!-- Heat emission -->
  <ellipse cx="-2" cy="-170" rx="10" ry="5" fill="#ff4400" opacity="0.1" filter="url(#heatbloom)"/>
  <circle  cx="-2" cy="-168" r="4"  fill="#ff6600" opacity="0.6" filter="url(#glow)"/>

  <!-- Stack B (right side) hz ≈ 112→158 -->
  <polygon points="22,-114 32,-114 32,-160 22,-160" fill="url(#stR)" stroke="#404040" stroke-width="1.2"/>
  <ellipse cx="27" cy="-114" rx="5" ry="2.5" fill="#383838" stroke="#505050" stroke-width="1"/>
  <ellipse cx="27" cy="-160" rx="5" ry="2.5" fill="#282020" stroke="#404040" stroke-width="1"/>
  <ellipse cx="27" cy="-163" rx="8" ry="4"   fill="#ff5500" opacity="0.08" filter="url(#heatbloom)"/>
  <circle  cx="27" cy="-161" r="3.5" fill="#ff7700" opacity="0.55" filter="url(#glow)"/>

  <!-- Stack C (left side) hz ≈ 112→154 -->
  <polygon points="-32,-116 -22,-116 -22,-156 -32,-156" fill="url(#stR)" stroke="#383838" stroke-width="1.2"/>
  <ellipse cx="-27" cy="-116" rx="5" ry="2.5" fill="#343434" stroke="#484848" stroke-width="1"/>
  <ellipse cx="-27" cy="-156" rx="5" ry="2.5" fill="#222020" stroke="#383838" stroke-width="1"/>
  <ellipse cx="-27" cy="-159" rx="7" ry="3.5" fill="#ff4400" opacity="0.07" filter="url(#heatbloom)"/>
  <circle  cx="-27" cy="-157" r="3"  fill="#ff6600" opacity="0.5" filter="url(#glow)"/>

  <!-- Atmospheric heat shimmer above stacks -->
  <ellipse cx="0" cy="-172" rx="40" ry="8" fill="#ff2200" opacity="0.04" filter="url(#softglow)"/>
</svg>
