<?xml version="1.0" encoding="UTF-8"?>
<!--
  Amber Stack – Housing Building (Master SVG, 4× tile resolution)
  ──────────────────────────────────────────────────────────────
  Tile: TILE_HALF_WIDTH=32, TILE_HALF_HEIGHT=16 → 64×32 px at 1×
  This SVG: 4× → tile footprint 256×128 px, total 256×308 px

  Isometric origin (0,0) = tile-top vertex
  Projection: screen_x = (wx-wy)×128,  screen_y = (wx+wy)×64 − hz

  PixiJS usage (displayed at 1× tile size):
    sprite.anchor.set(0.5, 178/308)   // tile-top vertex in image coords
    sprite.position.set(tileTopX, tileTopY)
    sprite.scale.set(64/256)           // 4× → 1×

  Geometry summary (screen coords at 4× scale):
    Foundation  hz 0→24   footprint ±128  (full tile)
    Block A     hz 24→88  footprint ±80   (lower residential block)
    Block B     hz 88→130 footprint ±48   (upper residential block)
    Parapet     hz 130→138 footprint ±50
    Roof utilities above hz 138

  Block A face panels (right face local coords, translate(0,24)):
    Face corners: TR(80,-48) TL(0,-8) BL(0,56) BR(80,16)
    y_top(x)=-8-x/2  y_bot(x)=56-x/2  y_mid(x)=24-x/2
    Horizontal divider: (80,-16)→(0,24)→(-80,-16)  [crosses both faces]
    Vertical divider R: x=40, y=-28→36  |  Vertical divider L: x=-40, y=-28→36
    Panel centers (right face): BR(60,10) BL(20,30) TR(60,-22) TL(20,-2)
    Panel centers (left face):  inner-B(-20,30) outer-B(-60,10) inner-T(-20,-2) outer-T(-60,-22)

  Block B face panels (right face local coords, translate(0,40)):
    Face corners: TR(48,-106) TL(0,-82) BL(0,-40) BR(48,-64)
    y_top(x)=-82-x/2  y_bot(x)=-40-x/2  y_mid(x)=-61-x/2
    Horizontal divider: (48,-85)→(0,-61)→(-48,-85)  [crosses both faces]
    Vertical divider R: x=24, y=-94→-52  |  Vertical divider L: x=-24, y=-94→-52
    Panel centers (right face): right(36,-79) left(12,-67)
    Panel centers (left face):  inner-R(-12,-67) outer-L(-36,-79)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-128 -178 256 308"
     width="256" height="308">
  <defs>
    <!-- Foundation (dark terracotta platform) -->
    <linearGradient id="fR" gradientUnits="userSpaceOnUse" x1="128" y1="40" x2="0" y2="104">
      <stop offset="0%"   stop-color="#8a3818"/>
      <stop offset="100%" stop-color="#4a1c0c"/>
    </linearGradient>
    <linearGradient id="fL" gradientUnits="userSpaceOnUse" x1="-128" y1="40" x2="0" y2="104">
      <stop offset="0%"   stop-color="#2a1008"/>
      <stop offset="100%" stop-color="#100604"/>
    </linearGradient>
    <linearGradient id="fT" gradientUnits="userSpaceOnUse" x1="0" y1="-24" x2="0" y2="104">
      <stop offset="0%"   stop-color="#b04820"/>
      <stop offset="100%" stop-color="#7a3010"/>
    </linearGradient>

    <!-- Block A – main lower residential block -->
    <linearGradient id="aR" gradientUnits="userSpaceOnUse" x1="80" y1="16" x2="0" y2="-48">
      <stop offset="0%"   stop-color="#c05828"/>
      <stop offset="60%"  stop-color="#8c3a18"/>
      <stop offset="100%" stop-color="#5c2008"/>
    </linearGradient>
    <linearGradient id="aL" gradientUnits="userSpaceOnUse" x1="-80" y1="16" x2="0" y2="-48">
      <stop offset="0%"   stop-color="#3a1208"/>
      <stop offset="100%" stop-color="#120604"/>
    </linearGradient>
    <linearGradient id="aT" gradientUnits="userSpaceOnUse" x1="0" y1="-88" x2="0" y2="-8">
      <stop offset="0%"   stop-color="#e07030"/>
      <stop offset="100%" stop-color="#a84820"/>
    </linearGradient>

    <!-- Block B – upper residential block -->
    <linearGradient id="bR" gradientUnits="userSpaceOnUse" x1="48" y1="-64" x2="0" y2="-106">
      <stop offset="0%"   stop-color="#d86830"/>
      <stop offset="50%"  stop-color="#a84a20"/>
      <stop offset="100%" stop-color="#7c3010"/>
    </linearGradient>
    <linearGradient id="bL" gradientUnits="userSpaceOnUse" x1="-48" y1="-64" x2="0" y2="-106">
      <stop offset="0%"   stop-color="#2a0e04"/>
      <stop offset="100%" stop-color="#0c0402"/>
    </linearGradient>
    <linearGradient id="bT" gradientUnits="userSpaceOnUse" x1="0" y1="-130" x2="0" y2="-82">
      <stop offset="0%"   stop-color="#f07840"/>
      <stop offset="100%" stop-color="#c05a28"/>
    </linearGradient>

    <!-- Window – warm amber glow (lit / right face) -->
    <radialGradient id="winW" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#fff8c0"/>
      <stop offset="40%"  stop-color="#ffcc44"/>
      <stop offset="100%" stop-color="#aa6600"/>
    </radialGradient>
    <!-- Window – dim amber (shadow / left face) -->
    <radialGradient id="winD" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#cc9922"/>
      <stop offset="100%" stop-color="#442200"/>
    </radialGradient>

    <!-- Glow filters -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══════════════════════════════════════════
       FOUNDATION   hz 0 → 24
       Bottom: N(0,0)   E(128,64) S(0,128) W(-128,64)
       Top:    N(0,-24) E(128,40) S(0,104) W(-128,40)
       ══════════════════════════════════════════ -->

  <polygon points="-128,64 0,128 0,104 -128,40" fill="url(#fL)" stroke="#cc5500" stroke-width="1.5"/>
  <polygon points="128,64 0,128 0,104 128,40"   fill="url(#fR)" stroke="#cc5500" stroke-width="1.5"/>
  <polygon points="0,-24 128,40 0,104 -128,40"  fill="url(#fT)" stroke="#cc5500" stroke-width="1.5"/>

  <!-- ══════════════════════════════════════════
       BLOCK A – hz 24 → 88  (footprint ±80)
       Centered on tile axis via translate(0, 24)
       ══════════════════════════════════════════ -->
  <g transform="translate(0, 24)">

  <!-- Left face -->
  <polygon points="-80,16 0,56 0,-8 -80,-48"  fill="url(#aL)" stroke="#cc5500" stroke-width="1.5"/>
  <line x1="-80" y1="16" x2="-80" y2="-48" stroke="#3a1208" stroke-width="2" opacity="0.5"/>

  <!-- Left face: outer-bottom panel window  (cx=-60, cy=10, hw=11, hh=8.5) -->
  <polygon points="-71,13 -49,24 -49,7 -71,-4"   fill="url(#winD)" stroke="#884400" stroke-width="1" opacity="0.75"/>
  <line x1="-60" y1="1.5"  x2="-60" y2="18.5" stroke="#aa6600" stroke-width="0.8" opacity="0.28"/>
  <line x1="-71" y1="4.5"  x2="-49" y2="15.5" stroke="#aa6600" stroke-width="0.8" opacity="0.28"/>

  <!-- Left face: inner-bottom panel window  (cx=-20, cy=30, hw=11, hh=8.5) -->
  <polygon points="-31,33 -9,44 -9,27 -31,16"   fill="url(#winD)" stroke="#884400" stroke-width="1" opacity="0.75"/>
  <line x1="-20" y1="21.5" x2="-20" y2="38.5" stroke="#aa6600" stroke-width="0.8" opacity="0.28"/>
  <line x1="-31" y1="24.5" x2="-9"  y2="35.5" stroke="#aa6600" stroke-width="0.8" opacity="0.28"/>

  <!-- Left face: outer-top panel window  (cx=-60, cy=-22, hw=11, hh=8.5) -->
  <polygon points="-71,-19 -49,-8 -49,-25 -71,-36"  fill="url(#winD)" stroke="#884400" stroke-width="1" opacity="0.75"/>
  <line x1="-60" y1="-30.5" x2="-60" y2="-13.5" stroke="#aa6600" stroke-width="0.8" opacity="0.28"/>
  <line x1="-71" y1="-27.5" x2="-49" y2="-16.5" stroke="#aa6600" stroke-width="0.8" opacity="0.28"/>

  <!-- Left face: inner-top panel window  (cx=-20, cy=-2, hw=11, hh=8.5) -->
  <polygon points="-31,1 -9,12 -9,-5 -31,-16"   fill="url(#winD)" stroke="#884400" stroke-width="1" opacity="0.75"/>
  <line x1="-20" y1="-10.5" x2="-20" y2="6.5"  stroke="#aa6600" stroke-width="0.8" opacity="0.28"/>
  <line x1="-31" y1="-7.5"  x2="-9"  y2="3.5"  stroke="#aa6600" stroke-width="0.8" opacity="0.28"/>

  <!-- Right face -->
  <polygon points="80,16 0,56 0,-8 80,-48"    fill="url(#aR)" stroke="#cc5500" stroke-width="1.5"/>
  <line x1="80" y1="16" x2="80" y2="-48" stroke="#e07030" stroke-width="2" opacity="0.6"/>

  <!-- Right face: bottom-right panel window  (cx=60, cy=10, hw=11, hh=8.5) -->
  <polygon points="71,13 49,24 49,7 71,-4"    fill="url(#winW)" stroke="#ffaa00" stroke-width="1.2"/>
  <line x1="60" y1="1.5"  x2="60" y2="18.5" stroke="#fff8c0" stroke-width="0.8" opacity="0.55"/>
  <line x1="71" y1="4.5"  x2="49" y2="15.5" stroke="#fff8c0" stroke-width="0.8" opacity="0.55"/>

  <!-- Right face: bottom-left panel window  (cx=20, cy=30, hw=11, hh=8.5) -->
  <polygon points="31,33 9,44 9,27 31,16"     fill="url(#winW)" stroke="#ffaa00" stroke-width="1.2"/>
  <line x1="20" y1="21.5" x2="20" y2="38.5" stroke="#fff8c0" stroke-width="0.8" opacity="0.55"/>
  <line x1="31" y1="24.5" x2="9"  y2="35.5" stroke="#fff8c0" stroke-width="0.8" opacity="0.55"/>

  <!-- Right face: top-right panel window  (cx=60, cy=-22, hw=11, hh=8.5) -->
  <polygon points="71,-19 49,-8 49,-25 71,-36"  fill="url(#winW)" stroke="#ffaa00" stroke-width="1.2"/>
  <line x1="60" y1="-30.5" x2="60" y2="-13.5" stroke="#fff8c0" stroke-width="0.8" opacity="0.55"/>
  <line x1="71" y1="-27.5" x2="49" y2="-16.5" stroke="#fff8c0" stroke-width="0.8" opacity="0.55"/>

  <!-- Right face: top-left panel window  (cx=20, cy=-2, hw=11, hh=8.5) -->
  <polygon points="31,1 9,12 9,-5 31,-16"     fill="url(#winW)" stroke="#ffaa00" stroke-width="1.2"/>
  <line x1="20" y1="-10.5" x2="20" y2="6.5"  stroke="#fff8c0" stroke-width="0.8" opacity="0.55"/>
  <line x1="31" y1="-7.5"  x2="9"  y2="3.5"  stroke="#fff8c0" stroke-width="0.8" opacity="0.55"/>

  <!-- Block A top face -->
  <polygon points="0,-88 80,-48 0,-8 -80,-48" fill="url(#aT)" stroke="#cc5500" stroke-width="1.5"/>

  <!-- Block A face panel dividers -->
  <!-- Vertical dividers: right face x=40 and left face x=-40, full height y=-28→36 -->
  <line x1="40"  y1="-28" x2="40"  y2="36" stroke="#ff8c00" stroke-width="2" opacity="0.75"/>
  <line x1="-40" y1="-28" x2="-40" y2="36" stroke="#aa4400" stroke-width="1.5" opacity="0.4"/>
  <!-- Horizontal divider: continuous polyline right→front→left at face midheight -->
  <line x1="80"  y1="-16" x2="0" y2="24" stroke="#ff8c00" stroke-width="2"   opacity="0.75"/>
  <line x1="0"   y1="24"  x2="-80" y2="-16" stroke="#aa4400" stroke-width="1.5" opacity="0.4"/>

  <!-- Block A: terrace corner lights (marks the step up to Block B) -->
  <circle cx="80"  cy="-48" r="5" fill="#ffaa00" filter="url(#glow)"/>
  <circle cx="-80" cy="-48" r="5" fill="#ff8c00" filter="url(#glow)" opacity="0.65"/>
  <circle cx="0"   cy="-8"  r="5" fill="#ffaa00" filter="url(#glow)"/>

  </g>

  <!-- ══════════════════════════════════════════
       BLOCK B – hz 88 → 130  (footprint ±48)
       Centered on tile axis via translate(0, 40)
       ══════════════════════════════════════════ -->
  <g transform="translate(0, 40)">

  <!-- Left face -->
  <polygon points="-48,-64 0,-40 0,-82 -48,-106"  fill="url(#bL)" stroke="#cc5500" stroke-width="1.5"/>
  <line x1="-48" y1="-64" x2="-48" y2="-106" stroke="#3a1208" stroke-width="2" opacity="0.5"/>

  <!-- Left face: outer-left panel window  (cx=-36, cy=-79, hw=8, hh=8) -->
  <polygon points="-44,-75 -28,-67 -28,-83 -44,-91"  fill="url(#winD)" stroke="#884400" stroke-width="1" opacity="0.65"/>
  <line x1="-36" y1="-87"   x2="-36" y2="-71"   stroke="#aa6600" stroke-width="0.8" opacity="0.28"/>
  <line x1="-44" y1="-83"   x2="-28" y2="-75"   stroke="#aa6600" stroke-width="0.8" opacity="0.28"/>

  <!-- Left face: inner-right panel window  (cx=-12, cy=-67, hw=8, hh=8) -->
  <polygon points="-20,-63 -4,-55 -4,-71 -20,-79"    fill="url(#winD)" stroke="#884400" stroke-width="1" opacity="0.65"/>
  <line x1="-12" y1="-75"   x2="-12" y2="-59"   stroke="#aa6600" stroke-width="0.8" opacity="0.28"/>
  <line x1="-20" y1="-71"   x2="-4"  y2="-63"   stroke="#aa6600" stroke-width="0.8" opacity="0.28"/>

  <!-- Right face -->
  <polygon points="48,-64 0,-40 0,-82 48,-106"    fill="url(#bR)" stroke="#cc5500" stroke-width="1.5"/>
  <line x1="48" y1="-64" x2="48" y2="-106" stroke="#e07030" stroke-width="2" opacity="0.55"/>

  <!-- Right face: right panel window  (cx=36, cy=-79, hw=8, hh=8) -->
  <polygon points="44,-75 28,-67 28,-83 44,-91"  fill="url(#winW)" stroke="#ffaa00" stroke-width="1.2"/>
  <line x1="36" y1="-87"   x2="36" y2="-71"   stroke="#fff8c0" stroke-width="0.8" opacity="0.55"/>
  <line x1="44" y1="-83"   x2="28" y2="-75"   stroke="#fff8c0" stroke-width="0.8" opacity="0.55"/>

  <!-- Right face: left panel window  (cx=12, cy=-67, hw=8, hh=8) -->
  <polygon points="20,-63 4,-55 4,-71 20,-79"   fill="url(#winW)" stroke="#ffaa00" stroke-width="1.2"/>
  <line x1="12" y1="-75"   x2="12" y2="-59"   stroke="#fff8c0" stroke-width="0.8" opacity="0.55"/>
  <line x1="20" y1="-71"   x2="4"  y2="-63"   stroke="#fff8c0" stroke-width="0.8" opacity="0.55"/>

  <!-- Block B top face -->
  <polygon points="0,-130 48,-106 0,-82 -48,-106" fill="url(#bT)" stroke="#cc5500" stroke-width="1.5"/>

  <!-- Block B face panel dividers -->
  <!-- Vertical dividers: right face x=24 and left face x=-24, y=-94→-52 -->
  <line x1="24"  y1="-94" x2="24"  y2="-52" stroke="#ff8c00" stroke-width="2"   opacity="0.75"/>
  <line x1="-24" y1="-94" x2="-24" y2="-52" stroke="#aa4400" stroke-width="1.5" opacity="0.4"/>
  <!-- Horizontal divider: continuous right→front→left at face midheight -->
  <line x1="48"  y1="-85" x2="0" y2="-61"   stroke="#ff8c00" stroke-width="2"   opacity="0.75"/>
  <line x1="0"   y1="-61" x2="-48" y2="-85" stroke="#aa4400" stroke-width="1.5" opacity="0.4"/>

  </g>

  <!-- ══════════════════════════════════════════
       PARAPET / ROOF RIM   hz 130 → 138  (±50)
       Centered on tile axis via translate(0, 39)
       ══════════════════════════════════════════ -->
  <g transform="translate(0, 39)">

  <polygon points="-50,-105 0,-80 0,-88 -50,-113" fill="#3a1208" stroke="#aa4400" stroke-width="1.2"/>
  <polygon points="50,-105 0,-80 0,-88 50,-113"   fill="#c05020" stroke="#ff8c00" stroke-width="1.2"/>
  <polygon points="0,-138 50,-113 0,-88 -50,-113" fill="#d86030" stroke="#ff8c00" stroke-width="1.2"/>

  <!-- Parapet corner lights -->
  <circle cx="50"  cy="-113" r="4" fill="#ff6600" filter="url(#glow)"/>
  <circle cx="-50" cy="-113" r="4" fill="#ff8c00" filter="url(#glow)" opacity="0.7"/>
  <circle cx="0"   cy="-88"  r="4" fill="#ff6600" filter="url(#glow)"/>

  <!-- ══════════════════════════════════════════
       ROOFTOP UTILITIES
       (axial: extra +25 to sit on parapet top center, not its N corner)
       ══════════════════════════════════════════ -->
  <g transform="translate(0, 25)">

  <!-- Communication dish (centered on parapet, on vertical axis) -->
  <line x1="0" y1="-132" x2="0" y2="-148"   stroke="#cc7730" stroke-width="2.5"/>
  <ellipse cx="0" cy="-151" rx="14" ry="8"
           fill="#b85020" stroke="#ff8c00" stroke-width="1.5" opacity="0.9"/>
  <ellipse cx="0" cy="-151" rx="8" ry="4.5"
           fill="none" stroke="#ffcc44" stroke-width="1"   opacity="0.65"/>
  <circle  cx="0" cy="-151" r="2.5" fill="#ffcc44"/>

  </g>
  </g>
</svg>
