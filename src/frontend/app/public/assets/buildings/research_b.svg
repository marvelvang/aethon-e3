<?xml version="1.0" encoding="UTF-8"?>
<!--
  AuriSpire B – Research Building Proposal B (Master SVG, 4× tile resolution)
  Drei schlanke Gold/Elfenbein-Türme mit Kristallkappen · X-Verstrebungen
  Viewbox: -128 -178 256 308  |  Basisplatte identisch zu allen anderen Gebäuden
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-128 -178 256 308"
     width="256" height="308">
  <defs>
    <!-- Foundation: warm dark amber-brown (same as A) -->
    <linearGradient id="fR" gradientUnits="userSpaceOnUse" x1="128" y1="40" x2="0" y2="104">
      <stop offset="0%"   stop-color="#4c3010"/>
      <stop offset="100%" stop-color="#241808"/>
    </linearGradient>
    <linearGradient id="fL" gradientUnits="userSpaceOnUse" x1="-128" y1="40" x2="0" y2="104">
      <stop offset="0%"   stop-color="#1c1208"/>
      <stop offset="100%" stop-color="#0e0a04"/>
    </linearGradient>
    <linearGradient id="fT" gradientUnits="userSpaceOnUse" x1="0" y1="-24" x2="0" y2="104">
      <stop offset="0%"   stop-color="#5c4018"/>
      <stop offset="100%" stop-color="#3a2a0e"/>
    </linearGradient>
    <!-- Base unit -->
    <linearGradient id="bR" gradientUnits="userSpaceOnUse" x1="88" y1="4" x2="0" y2="16">
      <stop offset="0%"   stop-color="#4c3c28"/>
      <stop offset="60%"  stop-color="#2e2418"/>
      <stop offset="100%" stop-color="#1c160e"/>
    </linearGradient>
    <linearGradient id="bL" gradientUnits="userSpaceOnUse" x1="-88" y1="4" x2="0" y2="16">
      <stop offset="0%"   stop-color="#1a1008"/>
      <stop offset="100%" stop-color="#0e0a04"/>
    </linearGradient>
    <linearGradient id="bT" gradientUnits="userSpaceOnUse" x1="0" y1="-72" x2="0" y2="16">
      <stop offset="0%"   stop-color="#5e4c30"/>
      <stop offset="100%" stop-color="#3a2e1c"/>
    </linearGradient>
    <!-- Slender tower right face: ivory/gold -->
    <linearGradient id="cyR" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%"   stop-color="#786030"/>
      <stop offset="100%" stop-color="#c0a860"/>
    </linearGradient>
    <!-- Tower left face: dark golden shadow -->
    <linearGradient id="cyL" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%"   stop-color="#201808"/>
      <stop offset="100%" stop-color="#2e2410"/>
    </linearGradient>
    <!-- Tower top face: bright gold -->
    <linearGradient id="cyTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#e0c870"/>
      <stop offset="100%" stop-color="#a08840"/>
    </linearGradient>
    <!-- Crystal cap gradient -->
    <radialGradient id="crystal" cx="35%" cy="25%" r="70%">
      <stop offset="0%"   stop-color="#fffce0"/>
      <stop offset="30%"  stop-color="#f0d860"/>
      <stop offset="65%"  stop-color="#c09020"/>
      <stop offset="100%" stop-color="#503800"/>
    </radialGradient>
    <radialGradient id="crystalDim" cx="35%" cy="25%" r="70%">
      <stop offset="0%"   stop-color="#706020"/>
      <stop offset="50%"  stop-color="#3c2c08"/>
      <stop offset="100%" stop-color="#180e00"/>
    </radialGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══ FOUNDATION hz 0→24 (±128) ══ -->
  <polygon points="-128,64 0,128 0,104 -128,40"  fill="url(#fL)" stroke="#3a2808" stroke-width="1.5"/>
  <polygon points="128,64 0,128 0,104 128,40"    fill="url(#fR)" stroke="#4c3810" stroke-width="1.5"/>
  <polygon points="0,-24 128,40 0,104 -128,40"   fill="url(#fT)" stroke="#4c3810" stroke-width="1.5"/>

  <g transform="translate(0, 36)">
  <!-- ══ BASE UNIT hz 24→56 (±88) ══ -->
  <polygon points="-88,4 0,48 0,16 -88,-28"   fill="url(#bL)" stroke="#1e1408" stroke-width="1.5"/>
  <polygon points="88,4 0,48 0,16 88,-28"     fill="url(#bR)" stroke="#4c3c28" stroke-width="1.5"/>
  <polygon points="0,-72 88,-28 0,16 -88,-28"  fill="url(#bT)" stroke="#4c3c28" stroke-width="1.5"/>
  <line x1="88"  y1="4"  x2="88"  y2="-28" stroke="#d4a820" stroke-width="2"   opacity="0.5"/>
  <line x1="66"  y1="7"  x2="22"  y2="29"  stroke="#a88020" stroke-width="1.5" opacity="0.4"/>
  <line x1="66"  y1="-1" x2="22"  y2="21"  stroke="#a88020" stroke-width="1.5" opacity="0.4"/>
  <line x1="-88" y1="4"  x2="-88" y2="-28" stroke="#201408" stroke-width="2"   opacity="0.5"/>
  <circle cx="88"  cy="-28" r="5" fill="#e8c840" filter="url(#glow)"/>
  <circle cx="-88" cy="-28" r="5" fill="#e8c840" filter="url(#glow)" opacity="0.55"/>
  <circle cx="0"   cy="16"  r="5" fill="#e8c840" filter="url(#glow)"/>

  <!-- ══ THREE SLENDER TOWERS ══
       NW: cx=-36 front_y=-35  w=13  h=92
           left: (-49,-42)(-36,-35)(-36,-127)(-49,-134)
           right:(-23,-42)(-36,-35)(-36,-127)(-23,-134)
           top:  (-36,-140)(-23,-134)(-36,-127)(-49,-134)
       NE: mirror at cx=+36
       S:  cx=0  front_y=-10  w=13  h=92
           left: (-13,-17)(0,-10)(0,-102)(-13,-109)
           right:(13,-17)(0,-10)(0,-102)(13,-109)
           top:  (0,-115)(13,-109)(0,-102)(-13,-109)            -->

  <!-- ─── NW TOWER ─── -->
  <polygon points="-49,-42 -36,-35 -36,-127 -49,-134" fill="url(#cyL)" stroke="#1c1408" stroke-width="1.2"/>
  <polygon points="-23,-42 -36,-35 -36,-127 -23,-134" fill="url(#cyR)" stroke="#b09040" stroke-width="1.2"/>
  <line x1="-23" y1="-42" x2="-23" y2="-134" stroke="#e0c860" stroke-width="1.5" opacity="0.6"/>
  <!-- detail band -->
  <line x1="-23" y1="-70" x2="-36" y2="-66" stroke="#f0d840" stroke-width="1.5" opacity="0.55"/>
  <line x1="-23" y1="-100" x2="-36" y2="-96" stroke="#f0d840" stroke-width="1.5" opacity="0.55"/>
  <polygon points="-36,-140 -23,-134 -36,-127 -49,-134" fill="url(#cyTop)" stroke="#b09040" stroke-width="1.2"/>
  <!-- crystal cap: small prism on top -->
  <!-- cap base: same as top face diamond, crystal face right, dim left, peak -->
  <polygon points="-36,-147 -23,-134 -36,-140 -49,-134" fill="url(#crystalDim)" stroke="#c09820" stroke-width="1"/>
  <polygon points="-36,-147 -23,-134 -36,-140" fill="url(#crystal)" opacity="0.92"/>
  <polygon points="-36,-147 -23,-134 -36,-140" fill="#f8e860" opacity="0.08" filter="url(#softglow)"/>
  <circle cx="-36" cy="-147" r="3.5" fill="#fff8c0" filter="url(#glow)" opacity="0.9"/>

  <!-- ─── NE TOWER ─── -->
  <polygon points="23,-42 36,-35 36,-127 23,-134"  fill="url(#cyL)" stroke="#1c1408" stroke-width="1.2"/>
  <polygon points="49,-42 36,-35 36,-127 49,-134"  fill="url(#cyR)" stroke="#b09040" stroke-width="1.2"/>
  <line x1="49" y1="-42" x2="49" y2="-134" stroke="#e0c860" stroke-width="1.5" opacity="0.6"/>
  <line x1="49" y1="-70" x2="36" y2="-66"  stroke="#f0d840" stroke-width="1.5" opacity="0.55"/>
  <line x1="49" y1="-100" x2="36" y2="-96" stroke="#f0d840" stroke-width="1.5" opacity="0.55"/>
  <polygon points="36,-140 49,-134 36,-127 23,-134" fill="url(#cyTop)" stroke="#b09040" stroke-width="1.2"/>
  <!-- crystal cap NE -->
  <polygon points="36,-147 23,-134 36,-140 49,-134"  fill="url(#crystalDim)" stroke="#c09820" stroke-width="1"/>
  <polygon points="36,-147 49,-134 36,-140"           fill="url(#crystal)"    opacity="0.92"/>
  <polygon points="36,-147 49,-134 36,-140"           fill="#f8e860"          opacity="0.08" filter="url(#softglow)"/>
  <circle cx="36" cy="-147" r="3.5" fill="#fff8c0" filter="url(#glow)" opacity="0.9"/>

  <!-- ─── X-BRACING NW↔NE ─── -->
  <!-- X cross-brace between the two back towers at mid-height -->
  <line x1="-23" y1="-72" x2="23" y2="-104" stroke="#c0a030" stroke-width="2" opacity="0.6"/>
  <line x1="-23" y1="-104" x2="23" y2="-72" stroke="#c0a030" stroke-width="2" opacity="0.6"/>
  <!-- Lower base struts to S -->
  <line x1="-23" y1="-50" x2="-11" y2="-25" stroke="#a08028" stroke-width="2" opacity="0.55" stroke-linecap="round"/>
  <line x1=" 23" y1="-50" x2=" 11" y2="-25" stroke="#a08028" stroke-width="2" opacity="0.55" stroke-linecap="round"/>

  <!-- ─── S TOWER ─── -->
  <polygon points="-13,-17 0,-10 0,-102 -13,-109" fill="url(#cyL)" stroke="#1c1408" stroke-width="1.2"/>
  <polygon points="13,-17 0,-10 0,-102 13,-109"   fill="url(#cyR)" stroke="#b09040" stroke-width="1.2"/>
  <line x1="13" y1="-17" x2="13" y2="-109" stroke="#e0c860" stroke-width="1.5" opacity="0.65"/>
  <line x1="13" y1="-46" x2="0"  y2="-42"  stroke="#f0d840" stroke-width="1.5" opacity="0.6"/>
  <line x1="13" y1="-76" x2="0"  y2="-72"  stroke="#f0d840" stroke-width="1.5" opacity="0.6"/>
  <polygon points="0,-115 13,-109 0,-102 -13,-109" fill="url(#cyTop)" stroke="#b09040" stroke-width="1.2"/>
  <!-- crystal cap S -->
  <polygon points="0,-122 -13,-109 0,-115 13,-109"  fill="url(#crystalDim)" stroke="#c09820" stroke-width="1"/>
  <polygon points="0,-122 13,-109 0,-115"            fill="url(#crystal)"    opacity="0.92"/>
  <polygon points="0,-122 13,-109 0,-115"            fill="#f8e860"          opacity="0.1"  filter="url(#softglow)"/>
  <circle cx="0" cy="-122" r="3.5" fill="#fff8c0" filter="url(#glow)" opacity="0.95"/>

  </g>
</svg>
