<?xml version="1.0" encoding="UTF-8"?>
<!--
  TriLab A (rev 5) – Research Building (Master SVG, 4× tile resolution)

  GEOMETRIE (local = innerhalb translate(0,36)):
  ─ Basisplatte-Diamant: N(0,−72) E(88,−28) S(0,16) W(−88,−28)
  ─ Zylinderzentren (äußerer Untereckpunkt auf Plattenrand):
      NW/NE: center_y=−43  →  cy_front = −36  (outer vertex on NW/NE boundary at x=±58, y=−43)
      SW/SE: center_y=−13  →  cy_front = − 6  (outer vertex on SW/SE boundary at x=±58, y=−13)
  ─ Alle Seitenflächen-Unterkanten haben Steigung ±0,5 (isometrisch korrekt)
  ─ Zylinder: w=14, h=72
      NW/NE  cy_LR_bot=−43  cy_top=−108  cy_LR_top=−115  cy_N_top=−122
      SW/SE  cy_LR_bot=−13  cy_top=− 78  cy_LR_top=− 85  cy_N_top=− 92
  ─ Ring verbindet Glüh-Knoten (cy_LR_top): (±44,−115) und (±44,−85)
  ─ Ringzentrum: (0,−100)  ←  unverändert
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="-128 -178 256 308"
     width="256" height="308">
  <defs>
    <!-- Foundation: warm dark amber-brown -->
    <linearGradient id="fR" gradientUnits="userSpaceOnUse" x1="128" y1="40" x2="0" y2="104">
      <stop offset="0%"   stop-color="#4c3010"/>
      <stop offset="100%" stop-color="#241808"/>
    </linearGradient>
    <linearGradient id="fL" gradientUnits="userSpaceOnUse" x1="-128" y1="40" x2="0" y2="104">
      <stop offset="0%"   stop-color="#1c1208"/>
      <stop offset="100%" stop-color="#0e0a04"/>
    </linearGradient>
    <linearGradient id="fT" gradientUnits="userSpaceOnUse" x1="0" y1="-24" x2="0" y2="104">
      <stop offset="0%"   stop-color="#5c4018"/>
      <stop offset="100%" stop-color="#3a2a0e"/>
    </linearGradient>
    <!-- Base unit: identisch Consumer (±88, translate 0,36) -->
    <linearGradient id="bR" gradientUnits="userSpaceOnUse" x1="88" y1="4" x2="0" y2="16">
      <stop offset="0%"   stop-color="#4c3c28"/>
      <stop offset="60%"  stop-color="#2e2418"/>
      <stop offset="100%" stop-color="#1c160e"/>
    </linearGradient>
    <linearGradient id="bL" gradientUnits="userSpaceOnUse" x1="-88" y1="4" x2="0" y2="16">
      <stop offset="0%"   stop-color="#1a1008"/>
      <stop offset="100%" stop-color="#0e0a04"/>
    </linearGradient>
    <linearGradient id="bT" gradientUnits="userSpaceOnUse" x1="0" y1="-72" x2="0" y2="16">
      <stop offset="0%"   stop-color="#5e4c30"/>
      <stop offset="100%" stop-color="#3a2e1c"/>
    </linearGradient>
    <!-- Cylinder right face -->
    <linearGradient id="cyR" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%"   stop-color="#504030"/>
      <stop offset="100%" stop-color="#7e6a50"/>
    </linearGradient>
    <!-- Cylinder left face -->
    <linearGradient id="cyL" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%"   stop-color="#120e06"/>
      <stop offset="100%" stop-color="#1c1408"/>
    </linearGradient>
    <!-- Cylinder top face -->
    <linearGradient id="cyTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#9a8868"/>
      <stop offset="100%" stop-color="#685848"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ringglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══ FOUNDATION hz 0→24 (±128) ══ -->
  <polygon points="-128,64 0,128 0,104 -128,40"  fill="url(#fL)" stroke="#3a2808" stroke-width="1.5"/>
  <polygon points="128,64 0,128 0,104 128,40"    fill="url(#fR)" stroke="#4c3810" stroke-width="1.5"/>
  <polygon points="0,-24 128,40 0,104 -128,40"   fill="url(#fT)" stroke="#4c3810" stroke-width="1.5"/>

  <g transform="translate(0, 36)">
  <!-- ══ BASE UNIT – identische Abmaße wie Consumer ══ -->
  <polygon points="-88,4 0,48 0,16 -88,-28"   fill="url(#bL)" stroke="#1e1408" stroke-width="1.5"/>
  <polygon points="88,4 0,48 0,16 88,-28"     fill="url(#bR)" stroke="#4c3c28" stroke-width="1.5"/>
  <polygon points="0,-72 88,-28 0,16 -88,-28"  fill="url(#bT)" stroke="#4c3c28" stroke-width="1.5"/>
  <!-- Eckkante rechts -->
  <line x1="88"  y1="4"  x2="88"  y2="-28" stroke="#d49010" stroke-width="2"   opacity="0.5"/>
  <!-- 3 Diagonalstriche rechte Fläche -->
  <line x1="66"  y1="7"  x2="22"  y2="29"  stroke="#a87020" stroke-width="1.5" opacity="0.45"/>
  <line x1="66"  y1="-1" x2="22"  y2="21"  stroke="#a87020" stroke-width="1.5" opacity="0.45"/>
  <line x1="66"  y1="-9" x2="22"  y2="13"  stroke="#a87020" stroke-width="1.5" opacity="0.45"/>
  <!-- Eckkante links -->
  <line x1="-88" y1="4"  x2="-88" y2="-28" stroke="#201408" stroke-width="2"   opacity="0.5"/>
  <!-- 3 Diagonalstriche linke Fläche (gedimmt) -->
  <line x1="-66" y1="7"  x2="-22" y2="29"  stroke="#6a4010" stroke-width="1.5" opacity="0.35"/>
  <line x1="-66" y1="-1" x2="-22" y2="21"  stroke="#6a4010" stroke-width="1.5" opacity="0.35"/>
  <line x1="-66" y1="-9" x2="-22" y2="13"  stroke="#6a4010" stroke-width="1.5" opacity="0.35"/>
  <!-- Basis-Eckknoten -->
  <circle cx="88"  cy="-28" r="5" fill="#f0b030" filter="url(#glow)"/>
  <circle cx="-88" cy="-28" r="5" fill="#f0b030" filter="url(#glow)" opacity="0.55"/>
  <circle cx="0"   cy="16"  r="5" fill="#f0b030" filter="url(#glow)"/>

  <!-- ══ VIER ZYLINDER  cx=±44  w=14  h=72
       Painter-Reihenfolge: NW → NE → (Ring-Rück/Seiten) → SW → SE → (Ring-Front+Spire)
  ══ -->

  <!-- ─── NW  cx=−44  cy_front=−36 ─── -->
  <polygon points="-58,-43 -44,-36 -44,-108 -58,-115" fill="url(#cyL)" stroke="#120e06" stroke-width="1.2"/>
  <polygon points="-30,-43 -44,-36 -44,-108 -30,-115" fill="url(#cyR)" stroke="#6a5840" stroke-width="1.2"/>
  <line x1="-30" y1="-43" x2="-30" y2="-115" stroke="#9a8268" stroke-width="1.5" opacity="0.5"/>
  <line x1="-30" y1="-79" x2="-44" y2="-75"  stroke="#d49010" stroke-width="2"   opacity="0.62"/>
  <polygon points="-44,-122 -30,-115 -44,-108 -58,-115" fill="url(#cyTop)" stroke="#6a5840" stroke-width="1.2"/>
  <circle cx="-44" cy="-115" r="4" fill="#f0b030" filter="url(#glow)" opacity="0.8"/>

  <!-- ─── NE  cx=+44  cy_front=−36 ─── -->
  <polygon points="30,-43 44,-36 44,-108 30,-115"  fill="url(#cyL)" stroke="#120e06" stroke-width="1.2"/>
  <polygon points="58,-43 44,-36 44,-108 58,-115"  fill="url(#cyR)" stroke="#6a5840" stroke-width="1.2"/>
  <line x1="58" y1="-43" x2="58" y2="-115" stroke="#9a8268" stroke-width="1.5" opacity="0.5"/>
  <line x1="58" y1="-79" x2="44" y2="-75"  stroke="#d49010" stroke-width="2"   opacity="0.62"/>
  <polygon points="44,-122 58,-115 44,-108 30,-115" fill="url(#cyTop)" stroke="#6a5840" stroke-width="1.2"/>
  <circle cx="44" cy="-115" r="4" fill="#f0b030" filter="url(#glow)" opacity="0.8"/>

  <!-- ─── RING-RÜCKSEITE + SEITENKANTEN ─── -->
  <!-- Hinten: NW(−44,−115) → NE(44,−115) -->
  <line x1="-44" y1="-115" x2="44" y2="-115" stroke="#f0c040" stroke-width="6"   opacity="0.15" filter="url(#ringglow)"/>
  <line x1="-44" y1="-115" x2="44" y2="-115" stroke="#d49010" stroke-width="2"   opacity="0.82"/>
  <!-- Links: NW(−44,−115) → SW(−44,−85) -->
  <line x1="-44" y1="-115" x2="-44" y2="-85" stroke="#f0c040" stroke-width="5"   opacity="0.12" filter="url(#ringglow)"/>
  <line x1="-44" y1="-115" x2="-44" y2="-85" stroke="#d49010" stroke-width="1.8" opacity="0.72"/>
  <!-- Rechts: NE(44,−115) → SE(44,−85) -->
  <line x1="44"  y1="-115" x2="44"  y2="-85" stroke="#f0c040" stroke-width="5"   opacity="0.12" filter="url(#ringglow)"/>
  <line x1="44"  y1="-115" x2="44"  y2="-85" stroke="#d49010" stroke-width="1.8" opacity="0.72"/>
  <!-- Kreuzstreben hintere Hälften → Zentrum(0,−100) -->
  <line x1="-44" y1="-115" x2="0"   y2="-100" stroke="#c08010" stroke-width="1.2" opacity="0.5"/>
  <line x1="44"  y1="-115" x2="0"   y2="-100" stroke="#c08010" stroke-width="1.2" opacity="0.5"/>

  <!-- ─── SW  cx=−44  cy_front=−6 ─── -->
  <polygon points="-58,-13 -44,-6 -44,-78 -58,-85"   fill="url(#cyL)" stroke="#120e06" stroke-width="1.2"/>
  <polygon points="-30,-13 -44,-6 -44,-78 -30,-85"   fill="url(#cyR)" stroke="#6a5840" stroke-width="1.2"/>
  <line x1="-30" y1="-13"  x2="-30" y2="-85"  stroke="#9a8268" stroke-width="1.5" opacity="0.55"/>
  <line x1="-30" y1="-49"  x2="-44" y2="-45"  stroke="#d49010" stroke-width="2"   opacity="0.68"/>
  <polygon points="-44,-92 -30,-85 -44,-78 -58,-85" fill="url(#cyTop)" stroke="#6a5840" stroke-width="1.2"/>
  <circle cx="-44" cy="-85" r="4" fill="#f0b030" filter="url(#glow)" opacity="0.88"/>

  <!-- ─── SE  cx=+44  cy_front=−6 ─── -->
  <polygon points="30,-13 44,-6 44,-78 30,-85"    fill="url(#cyL)" stroke="#120e06" stroke-width="1.2"/>
  <polygon points="58,-13 44,-6 44,-78 58,-85"    fill="url(#cyR)" stroke="#6a5840" stroke-width="1.2"/>
  <line x1="58" y1="-13"  x2="58" y2="-85"  stroke="#9a8268" stroke-width="1.5" opacity="0.6"/>
  <line x1="58" y1="-49"  x2="44" y2="-45"  stroke="#d49010" stroke-width="2"   opacity="0.72"/>
  <polygon points="44,-92 58,-85 44,-78 30,-85"  fill="url(#cyTop)" stroke="#6a5840" stroke-width="1.2"/>
  <circle cx="44" cy="-85" r="4" fill="#f0b030" filter="url(#glow)" opacity="0.92"/>

  <!-- ─── RING-VORDERKANTE + KREUZSTREBEN-FRONT ─── -->
  <!-- Vorne: SE(44,−85) → SW(−44,−85) -->
  <line x1="44"  y1="-85" x2="-44" y2="-85" stroke="#f0c040" stroke-width="7"   opacity="0.18" filter="url(#ringglow)"/>
  <line x1="44"  y1="-85" x2="-44" y2="-85" stroke="#d49010" stroke-width="2"   opacity="0.88"/>
  <!-- Kreuzstreben vordere Hälften → Zentrum(0,−100) -->
  <line x1="-44" y1="-85" x2="0"   y2="-100" stroke="#c08010" stroke-width="1.2" opacity="0.58"/>
  <line x1="44"  y1="-85" x2="0"   y2="-100" stroke="#c08010" stroke-width="1.2" opacity="0.58"/>
  <!-- Zentrumsknoten -->
  <circle cx="0" cy="-100" r="4.5" fill="#f0b030" opacity="0.82" filter="url(#glow)"/>
  <circle cx="0" cy="-100" r="8"   fill="none" stroke="#f0b030" stroke-width="1.2" opacity="0.32"/>

  <!-- ══ ZENTRALER SPIRE (Basis am Ringzentrum 0,−100) ══ -->
  <line x1="0" y1="-100" x2="0" y2="-158" stroke="#b07810" stroke-width="2.5"/>
  <line x1="0" y1="-100" x2="0" y2="-158" stroke="#f0c040" stroke-width="1"   opacity="0.52"/>
  <line x1="-13" y1="-146" x2="13" y2="-146" stroke="#d49010" stroke-width="2"/>
  <line x1="-7"  y1="-134" x2="7"  y2="-134" stroke="#d49010" stroke-width="1.5"/>
  <circle cx="0" cy="-158" r="9"  fill="#f0c040" opacity="0.12" filter="url(#softglow)"/>
  <circle cx="0" cy="-158" r="5"  fill="#f0c040" opacity="0.88" filter="url(#glow)"/>
  <circle cx="0" cy="-158" r="2"  fill="#ffffff"/>

  </g>
</svg>
