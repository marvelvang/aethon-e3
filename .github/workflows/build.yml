name: Build & Verify

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/backend/aethon-e3.api/aethon-e3.api.csproj

      - name: Build backend + generate OpenAPI spec
        run: dotnet build src/backend/aethon-e3.api/aethon-e3.api.csproj --no-restore --configuration Release

      - name: Diagnose — where did v1.json land?
        run: |
          echo "=== searching for v1.json ==="
          find src/backend -name "v1.json" 2>/dev/null || echo "not found"
          echo "=== all json files in backend ==="
          find src/backend -name "*.json" ! -path "*/node_modules/*" 2>/dev/null

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/frontend

      - name: Generate TypeScript types from OpenAPI spec
        run: npm run generate
        working-directory: src/frontend

      - name: Build frontend
        run: npm run build
        working-directory: src/frontend
