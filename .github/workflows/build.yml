name: Build & Verify

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/backend/aethon-e3.api/aethon-e3.api.csproj

      - name: Build
        run: dotnet build src/backend/aethon-e3.api/aethon-e3.api.csproj --no-restore --configuration Release
